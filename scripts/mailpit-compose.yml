name: calibra-mailpit

# Shared local SMTP catcher across all spins. `pnpm spin start` brings this up on demand;
# `pnpm spin stop` does NOT touch it (other spins may still need it). One Mailpit per dev
# machine — concurrent spins point at the same inbox, which is intentional for the operator's
# "see the email I just triggered" workflow.
#
# Web UI:  http://localhost:18025
# SMTP:    localhost:11025  (no auth, no TLS — dev-only)

services:
    mailpit:
        image: axllent/mailpit:latest
        restart: unless-stopped
        ports:
            - "11025:1025"  # SMTP
            - "18025:8025"  # web UI + REST API
        environment:
            MP_MAX_MESSAGES: 5000
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8025/livez"]
            interval: 10s
            timeout: 3s
            retries: 5
