name: calibra-api

services:
    db:
        image: postgres:17-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${DB_USER:-calibra}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-calibra}
            POSTGRES_DB: ${DB_DATABASE:-calibra}
        ports:
            - "${DB_PORT:-5432}:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-calibra} -d ${DB_DATABASE:-calibra}"]
            interval: 5s
            timeout: 5s
            retries: 10

    pgadmin:
        image: dpage/pgadmin4:latest
        restart: unless-stopped
        ports:
            - "${PGADMIN_PORT:-5050}:80"
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@calibra.dev}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
            PGADMIN_CONFIG_SERVER_MODE: "False"
            PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - pgadmin_data:/var/lib/pgadmin

volumes:
    db_data:
    pgadmin_data:
