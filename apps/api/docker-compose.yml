name: calibra-api

# Per-spin infrastructure. Brought up by `scripts/spin.mjs` with COMPOSE_PROJECT_NAME set to
# `calibra-spin-<slug>` so each spin gets its own isolated set of containers + volumes. Every
# port is parameterised from the spin's deterministic port block — see `allocatePorts()`.
#
# Layout:
#   - db / pgadmin                 the spin's own Postgres + pgAdmin
#   - mailpit                      SMTP catcher; inbox is per-spin (no cross-spin leakage)
#   - redis                        load-bearing — Transmit redis transport, limiter, lock, cache bus
#   - redisinsight                 web UI for the same redis
#   - adminer                      generic DB browser, queue_jobs viewer
#
# Adminer's `ADMINER_DEFAULT_SERVER=host.docker.internal` lets it reach the spin's Postgres
# from inside the docker network — no need to know the spin's allocated DB port from the UI.

services:
    db:
        image: postgres:17-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${DB_USER:-calibra}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-calibra}
            POSTGRES_DB: ${DB_DATABASE:-calibra}
        ports:
            - "${DB_PORT:-5432}:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
            - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-calibra} -d ${DB_DATABASE:-calibra}"]
            interval: 5s
            timeout: 5s
            retries: 10

    pgadmin:
        image: dpage/pgadmin4:latest
        restart: unless-stopped
        ports:
            - "${PGADMIN_PORT:-5050}:80"
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@calibra.dev}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
            PGADMIN_CONFIG_SERVER_MODE: "False"
            PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - pgadmin_data:/var/lib/pgadmin

    mailpit:
        image: axllent/mailpit:latest
        restart: unless-stopped
        ports:
            - "${MAILPIT_SMTP_PORT:-1025}:1025"
            - "${MAILPIT_WEB_PORT:-8025}:8025"
        environment:
            MP_MAX_MESSAGES: 5000
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8025/livez"]
            interval: 10s
            timeout: 3s
            retries: 5

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        command: ["redis-server", "--appendonly", "yes"]
        ports:
            - "${REDIS_PORT:-6379}:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5

    redisinsight:
        image: redis/redisinsight:latest
        restart: unless-stopped
        ports:
            - "${REDISINSIGHT_PORT:-5540}:5540"
        volumes:
            - redisinsight_data:/data
        depends_on:
            redis:
                condition: service_healthy

    adminer:
        image: adminer:5
        restart: unless-stopped
        ports:
            - "${ADMINER_PORT:-8080}:8080"
        environment:
            ADMINER_DEFAULT_SERVER: host.docker.internal
            ADMINER_DESIGN: pepa-linha-dark
        extra_hosts:
            - "host.docker.internal:host-gateway"

volumes:
    db_data:
    pgadmin_data:
    redis_data:
    redisinsight_data:
