name: calibra-cms

services:
    db:
        image: mariadb:11
        restart: unless-stopped
        environment:
            MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-wordpress}
            MARIADB_USER: ${WORDPRESS_DB_USER:-wordpress}
            MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
            MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpassword}
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 10

    wordpress:
        build: .
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        ports:
            - "${WORDPRESS_PORT:-8080}:80"
        environment:
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
            WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
            WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
            WORDPRESS_TABLE_PREFIX: wp_
            WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-1}
            WORDPRESS_CONFIG_EXTRA: |
                define('WP_HOME', '${WP_HOME:-http://localhost:8080}');
                define('WP_SITEURL', '${WP_SITEURL:-http://localhost:8080}');
                define('WP_MEMORY_LIMIT', '512M');
        volumes:
            - wp_data:/var/www/html
            - ./wp-content/themes/calibra:/var/www/html/wp-content/themes/calibra
            - ./wp-content/plugins:/var/www/html/wp-content/plugins/local
            - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins

    wpcli:
        image: wordpress:cli
        depends_on:
            db:
                condition: service_healthy
            wordpress:
                condition: service_started
        user: "33:33"
        environment:
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
            WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
            WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
        volumes:
            - wp_data:/var/www/html
            - ./wp-content/themes/calibra:/var/www/html/wp-content/themes/calibra
            - ./wp-content/plugins:/var/www/html/wp-content/plugins/local
            - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
        entrypoint: ["wp", "--allow-root"]
        command: ["--info"]

volumes:
    db_data:
    wp_data:
