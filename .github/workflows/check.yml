name: Check

on:
    pull_request:
        branches: ["**"]
    push:
        branches: ["main"]
    merge_group:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
    FORCE_COLOR: 3
    TURBO_TELEMETRY_DISABLED: 1
    DO_NOT_TRACK: 1
    NODE_VERSION: "24.14.0"
    PNPM_VERSION: "10.32.1"

jobs:
    format-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm run format && pnpm run lint

    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm run typecheck

    test:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:17-alpine
                env:
                    POSTGRES_USER: calibra
                    POSTGRES_PASSWORD: calibra
                    POSTGRES_DB: calibra
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U calibra -d calibra"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 10
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - name: Create test database
              env:
                  PGPASSWORD: calibra
              run: psql -h localhost -U calibra -d calibra -c "CREATE DATABASE calibra_test OWNER calibra;"
            - run: pnpm run test

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm run build
