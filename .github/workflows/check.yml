name: Check

on:
    pull_request:
        branches: ["**"]
    push:
        branches: ["main"]
    merge_group:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
    FORCE_COLOR: 3
    TURBO_TELEMETRY_DISABLED: 1
    DO_NOT_TRACK: 1
    NODE_VERSION: "24.14.0"
    PNPM_VERSION: "10.32.1"

jobs:
    format-lint:
        runs-on: ubuntu-latest
        timeout-minutes: 6
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm run format && pnpm run lint

    typecheck:
        runs-on: ubuntu-latest
        timeout-minutes: 6
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm run typecheck

    test-frontend:
        runs-on: ubuntu-latest
        timeout-minutes: 4
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm --filter @calibra/sdk --filter @calibra/admin run test

    test-api:
        runs-on: ubuntu-latest
        timeout-minutes: 4
        strategy:
            fail-fast: false
            matrix:
                shard: [1, 2, 3, 4, 5, 6]
        services:
            postgres:
                image: postgres:17-alpine
                env:
                    POSTGRES_USER: calibra
                    POSTGRES_PASSWORD: calibra
                    POSTGRES_DB: calibra
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U calibra -d calibra"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 10
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 10
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - name: Create test database
              env:
                  PGPASSWORD: calibra
              run: psql -h localhost -U calibra -d calibra -c "CREATE DATABASE calibra_test OWNER calibra;"
            - name: Compute spec slice for this shard
              id: slice
              working-directory: apps/api
              run: |
                  paths=$(node scripts/shard-specs.mjs ${{ matrix.shard }} 6)
                  count=$(echo "$paths" | wc -w)
                  files=$(echo "$paths" | tr ' ' '\n' | sed 's/^/--files=/' | xargs)
                  echo "files=$files" >> "$GITHUB_OUTPUT"
                  echo "shard ${{ matrix.shard }}/6 has $count specs"
            - name: Run Japa on this shard's slice
              working-directory: apps/api
              run: pnpm test ${{ steps.slice.outputs.files }}

    test:
        needs: [test-frontend, test-api]
        if: always()
        runs-on: ubuntu-latest
        timeout-minutes: 4
        steps:
            - name: Aggregate test job results
              run: |
                  fe='${{ needs.test-frontend.result }}'
                  api='${{ needs.test-api.result }}'
                  echo "test-frontend: $fe"
                  echo "test-api:      $api"
                  if [ "$fe" != "success" ] || [ "$api" != "success" ]; then
                      exit 1
                  fi

    build:
        runs-on: ubuntu-latest
        timeout-minutes: 6
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm run build

    api-docs-sync:
        runs-on: ubuntu-latest
        timeout-minutes: 6
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm --filter @calibra/api-docs run build:json
            - name: Diff registered routes against the OpenAPI spec
              working-directory: apps/api
              env:
                  NODE_ENV: test
                  PORT: "3334"
                  HOST: "0.0.0.0"
                  APP_NAME: calibra-api
                  APP_KEY: ci-only-key-not-used-for-real-secrets
                  LOG_LEVEL: warn
                  DB_HOST: localhost
                  DB_PORT: "5432"
                  DB_USER: calibra
                  DB_PASSWORD: calibra
                  DB_DATABASE: calibra
                  # The next block satisfies env validation. check:api-docs only boots far
                  # enough to enumerate routes; none of these services are actually contacted.
                  MAIL_FROM_ADDRESS: ops@calibra.local
                  MAIL_FROM_NAME: Calibra
                  MAIL_NOTIFICATIONS_ENABLED: "false"
                  SMTP_HOST: localhost
                  SMTP_PORT: "11025"
                  REDIS_HOST: localhost
                  REDIS_PORT: "6379"
                  TRANSMIT_TRANSPORT: none
                  QUEUE_DRIVER: sync
                  LIMITER_STORE: memory
                  CACHE_DRIVER: memory
              run: node ace check:api-docs

    sdk-codegen-sync:
        runs-on: ubuntu-latest
        timeout-minutes: 6
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - name: Regenerate SDK types from the OpenAPI specs and assert no drift
              run: pnpm --filter @calibra/sdk run codegen:check
