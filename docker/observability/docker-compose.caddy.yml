# Caddy reverse proxy for the prod-parity per-spin stack. Terminates TLS for every service
# UI behind `https://<service>.<slug>.spin.localhost`, using Caddy's internal CA. The host
# needs `caddy trust` once to pick up the root cert (see `scripts/spin.md`); browsers without
# the cert show an "untrusted" page but the proxy still works (Caddy logs the missing trust
# and the operator can `--insecure` past it for one-offs).
#
# The api / admin / web routes target `host.docker.internal` because those processes run on
# the host via HMR, not in containers. Other services join the spin's default compose network
# and are reached container-to-container by service name.

services:
    caddy:
        image: caddy:2.8-alpine
        restart: unless-stopped
        ports:
            - "${CADDY_HTTP_PORT}:80"
            - "${CADDY_HTTPS_PORT}:443"
        volumes:
            - ${SPIN_CONFIG_DIR}/Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        extra_hosts:
            - "host.docker.internal:host-gateway"
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:80"]
            interval: 10s
            timeout: 3s
            retries: 5

volumes:
    caddy_data:
    caddy_config:
