# Per-spin GlitchTip (Sentry-protocol). The api forwards thrown exceptions via `@sentry/node`
# pointed at this instance; thrown errors surface at `errors.<slug>.spin.localhost` within
# seconds. DSN auto-provisioning is on the roadmap — for now the operator registers + creates
# org/project + copies the DSN once per spin (see scripts/spin.md).
#
# GlitchTip reuses the spin's Postgres (dedicated `glitchtip` database, created by
# `apps/api/docker/postgres-init/02_create_glitchtip_database.sql` on first volume init) and
# the spin's Redis (database index 1; the api uses index 0). Two services share one row but
# no spin shares state with another — that's the volume-isolation boundary.

services:
    glitchtip:
        image: glitchtip/glitchtip:v4.1
        restart: unless-stopped
        environment:
            SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
            DATABASE_URL: postgres://calibra:calibra@db:5432/glitchtip
            REDIS_URL: redis://redis:6379/1
            DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL}
            # Open registration so the first-time setup can create the spin admin without
            # shell exec. The instance is reachable only on the host via Caddy; this is
            # not a public surface.
            ENABLE_USER_REGISTRATION: "true"
            ENABLE_OPEN_USER_REGISTRATION: "true"
            EMAIL_URL: smtp://mailpit:1025
            CELERY_WORKER_AUTOSCALE: "1,3"
            CELERY_WORKER_MAX_TASKS_PER_CHILD: "100"
            PORT: "8000"
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        # Django runs migrations on first boot and answers `/api/0/` once the schema is
        # in place. The healthcheck targets the API root rather than `/`; the root is a
        # 404 until the SPA is built, but the API is up well before that.
        healthcheck:
            test: ["CMD-SHELL", "wget --quiet --spider --tries=1 http://localhost:8000/api/0/ 2>&1 | grep -qE '200|401|403' || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 20
            start_period: 60s

    glitchtip-worker:
        image: glitchtip/glitchtip:v4.1
        restart: unless-stopped
        command: ./bin/run-celery-with-beat.sh
        environment:
            SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
            DATABASE_URL: postgres://calibra:calibra@db:5432/glitchtip
            REDIS_URL: redis://redis:6379/1
            DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL}
            EMAIL_URL: smtp://mailpit:1025
        depends_on:
            glitchtip:
                condition: service_started
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
