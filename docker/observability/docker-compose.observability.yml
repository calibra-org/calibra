# Prod-parity observability stack — Prometheus + Grafana + Loki + Promtail + Tempo +
# Alertmanager + Uptime Kuma. Every service is reachable only inside the spin's compose
# network and fronted by Caddy for browser-facing UIs (so dev mirrors how prod will route
# behind Cloudflare/Arvan). The one exception is Tempo: the OTLP/HTTP receiver (4318) is
# published to the host port (`tempo` role) so the api on the host can send traces directly;
# Tempo's HTTP API (3200) is still container-only and fronted by Caddy for Grafana.
#
# Static configs (tempo.yml, loki.yml, alertmanager.yml, grafana dashboards) live in
# `docker/observability/` and are committed. Per-spin configs (prometheus.yml, promtail.yml,
# Grafana provisioning yaml, Caddyfile) live under `<worktree>/.spin/config/` and are
# regenerated by `scripts/spin.mjs` on every start.
#
# Retention: Loki + Tempo default to 7 days so a long-lived spin doesn't fill its disk.

services:
    prometheus:
        image: prom/prometheus:v3.0.1
        restart: unless-stopped
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
            - "--web.enable-lifecycle"
        volumes:
            - ${SPIN_CONFIG_DIR}/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            # Committed recording + alert rules — re-mounted read-only into every spin so a
            # `caddy trust`-style "set up once, works everywhere" applies to alerting too. The
            # generated prometheus.yml's `rule_files` glob picks up *.yml in here automatically.
            - ${OBSERVABILITY_DIR}/prometheus/rules:/etc/prometheus/rules:ro
            - prometheus_data:/prometheus
        extra_hosts:
            - "host.docker.internal:host-gateway"
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:9090/-/ready"]
            interval: 10s
            timeout: 3s
            retries: 5

    grafana:
        image: grafana/grafana:11.4.0
        restart: unless-stopped
        environment:
            # Per-spin dev tool, not a public surface — skip the login dance so dashboards
            # load on first visit. Production never sees this.
            GF_AUTH_ANONYMOUS_ENABLED: "true"
            GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
            GF_AUTH_DISABLE_LOGIN_FORM: "false"
            GF_USERS_ALLOW_SIGN_UP: "false"
            GF_LOG_MODE: console
            GF_LOG_LEVEL: warn
        volumes:
            - ${SPIN_CONFIG_DIR}/grafana/provisioning:/etc/grafana/provisioning:ro
            - ${OBSERVABILITY_DIR}/grafana/dashboards:/var/lib/grafana/dashboards:ro
            - grafana_data:/var/lib/grafana
        depends_on:
            prometheus:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget --quiet --spider http://localhost:3000/api/health || exit 1"]
            interval: 10s
            timeout: 3s
            retries: 5

    loki:
        image: grafana/loki:3.3.2
        restart: unless-stopped
        command: ["-config.file=/etc/loki/loki.yml"]
        volumes:
            - ${OBSERVABILITY_DIR}/loki/loki.yml:/etc/loki/loki.yml:ro
            - loki_data:/loki
        healthcheck:
            test: ["CMD-SHELL", "wget --quiet --spider http://localhost:3100/ready || exit 1"]
            interval: 10s
            timeout: 3s
            retries: 10

    promtail:
        image: grafana/promtail:3.3.2
        restart: unless-stopped
        command: ["-config.file=/etc/promtail/promtail.yml"]
        volumes:
            - ${SPIN_CONFIG_DIR}/promtail.yml:/etc/promtail/promtail.yml:ro
            - ${SPIN_LOG_DIR}:/var/log/api:ro
            # Position file persists scrape offsets across container restarts. Lives in the
            # spin's `.spin/data/promtail/` (pre-created by spin.mjs) so a restart doesn't
            # re-ship logs already pushed to Loki.
            - ${SPIN_DATA_DIR}/promtail:/run/promtail
        depends_on:
            loki:
                condition: service_healthy

    tempo:
        image: grafana/tempo:2.6.1
        restart: unless-stopped
        command: ["-config.file=/etc/tempo/tempo.yml"]
        ports:
            # OTLP/HTTP receiver published to the host so the api (running on the host via
            # HMR) can ship traces. Tempo's HTTP API (3200) stays container-only and is
            # reached by Grafana via the compose network.
            - "${TEMPO_OTLP_PORT}:4318"
        volumes:
            - ${OBSERVABILITY_DIR}/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
            - tempo_data:/var/tempo
        healthcheck:
            test: ["CMD-SHELL", "wget --quiet --spider http://localhost:3200/ready || exit 1"]
            interval: 10s
            timeout: 3s
            retries: 10

    alertmanager:
        image: prom/alertmanager:v0.27.0
        restart: unless-stopped
        command:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
        volumes:
            - ${OBSERVABILITY_DIR}/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
            - alertmanager_data:/alertmanager
        healthcheck:
            test: ["CMD-SHELL", "wget --quiet --spider http://localhost:9093/-/ready || exit 1"]
            interval: 10s
            timeout: 3s
            retries: 5

    uptimekuma:
        image: louislam/uptime-kuma:1
        restart: unless-stopped
        volumes:
            - uptimekuma_data:/app/data
        extra_hosts:
            - "host.docker.internal:host-gateway"

volumes:
    prometheus_data:
    grafana_data:
    loki_data:
    tempo_data:
    alertmanager_data:
    uptimekuma_data:
