openapi: 3.1.0

info:
    title: Calibra Storefront API
    version: "1.0.0"
    description: >
        Public REST API for the Calibra commerce backend — storefront-facing endpoints consumed by
        `apps/web/`. Persian (`fa`) is the default locale; pass `Accept-Language: en` to receive
        English copy. Money is reported in Rial minor units (`BIGINT`). Translatable content
        (product names, category names, descriptions) is resolved server-side from the active
        locale.

        ## Conventions

        - **Pagination.** Paginated list endpoints take `page` and `perPage` query params and
          return `{ data: [...], meta: { page, perPage, total, lastPage } }`.
        - **Money.** Every monetary field is in Rial minor units (BIGINT). The display currency
          (`IRR` or `IRT`) is reported separately on orders.
        - **Locale.** The active locale comes from `Accept-Language` (defaults to `fa`).
          Server-resolved strings (product names, region names, error messages) come back in that
          locale.
        - **Auth.** Public endpoints carry `security: []`. Authenticated endpoints use a bearer
          token from `POST /api/v1/auth/login`.
        - **Idempotency.** `POST /checkout/submit` and `POST /payment/init` accept an
          `Idempotency-Key` header so retries don't re-run side effects.
        - **HEAD methods.** AdonisJS auto-registers a `HEAD` handler for every `GET` route. Each
          `head:` entry below is a documentation companion that returns the same headers as the
          paired `get:` operation with an empty body.
    contact:
        name: Calibra Backend Team
        url: https://calibra.dev/support
        email: support@calibra.dev
    license:
        name: "UNLICENSED (Proprietary)"

servers:
    - url: http://localhost:3333
      description: Local development
    - url: https://api.calibra.dev
      description: Production

tags:
    - name: Auth
      description: Registration, login, logout, password reset.
    - name: Catalog
      description: Read-only product, category, attribute, brand, tag, and review endpoints.
    - name: Cart
      description: >
          Server-side cart resolved per visitor — anonymous via the `cart_token` cookie, or by
          bearer token once the customer signs in.
    - name: Checkout
      description: Cart → draft order → submit, with `Idempotency-Key` dedup on submit.
    - name: Account
      description: Authenticated customer profile, addresses, downloads, and order history.
    - name: Payment
      description: PSP init + gateway callback endpoints (storefront-facing).
    - name: Currency
      description: Public display-currency configuration for the money formatter.
    - name: Tenant
      description: Public tenant profile + runtime branding for the resolved shop.

