operationId: authLogin
summary: Log in with email and password
description: >
    Verifies the password against the stored hash and issues a fresh opaque bearer token. Wrong
    credentials return 400 with `code: E_INVALID_CREDENTIALS` (the same code regardless of
    whether the email exists or the password is wrong, to avoid leaking enumeration signal).
tags: [Auth]
security: []

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [email, password]
                properties:
                    email:
                        type: string
                        format: email
                        maxLength: 254
                        examples: ["ali@example.ir"]
                    password:
                        type: string
                        minLength: 1
                        maxLength: 128
                        examples: ["Password123"]

responses:
    "200":
        description: Logged in. The response carries a fresh bearer token plus the user envelope.
        content:
            application/json:
                schema:
                    type: object
                    required: [user, token]
                    properties:
                        user:
                            type: object
                            properties:
                                id: { type: string, description: "BIGINT id serialised as string." }
                                email: { type: string }
                                role: { type: string }
                                locale: { type: string }
                        customer:
                            anyOf:
                                - type: "null"
                                - type: object
                                  description: Base customer profile (no `profile_extensions`).
                                  properties:
                                      id: { type: string }
                                      user_id: { type: string }
                                      first_name: { type: [string, "null"] }
                                      last_name: { type: [string, "null"] }
                                      phone: { type: [string, "null"] }
                                      country_default: { type: string }
                                      is_paying_customer: { type: boolean }
                                      attributes:
                                          type: object
                                          additionalProperties: true
                                      created_at: { type: [string, "null"], format: date-time }
                                      updated_at: { type: [string, "null"], format: date-time }
                        token:
                            type: object
                            required: [type, value]
                            properties:
                                type: { type: string, examples: ["bearer"] }
                                value: { type: string }
                                expires_at: { type: [string, "null"], format: date-time }
    "400":
        $ref: "../../../common/components/responses/BadRequest.yaml"
    "422":
        $ref: "../../../common/components/responses/ValidationError.yaml"
