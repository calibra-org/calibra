operationId: authLogin
summary: Log in with email and password
description: >
    Verifies the password against the stored hash and issues a fresh opaque bearer token. Wrong
    credentials return 400 with `code: E_INVALID_CREDENTIALS` (the same code regardless of
    whether the email exists or the password is wrong, to avoid leaking enumeration signal).
tags: [Auth]
security: []

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [email, password]
                properties:
                    email:
                        type: string
                        format: email
                        maxLength: 254
                        examples: ["ali@example.ir"]
                    password:
                        type: string
                        minLength: 1
                        maxLength: 128
                        examples: ["Password123"]

responses:
    "200":
        description: Logged in. The response carries a fresh bearer token plus the user envelope.
        content:
            application/json:
                schema:
                    type: object
                    required: [user, customer, token]
                    properties:
                        user: { $ref: "../../components/schemas/AuthUser.yaml" }
                        customer:
                            anyOf:
                                - type: "null"
                                - $ref: "../../components/schemas/CustomerBase.yaml"
                        token: { $ref: "../../components/schemas/BearerToken.yaml" }
    "400":
        $ref: "../../../common/components/responses/BadRequest.yaml"
    "422":
        $ref: "../../../common/components/responses/ValidationError.yaml"
