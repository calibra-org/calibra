operationId: authPasswordForgot
summary: Request a password-reset email
description: >
    Issues a one-shot password-reset token and (when the configured mailer is bound) sends it to
    the requested email. The response is always `204` regardless of whether the email is
    registered, so attackers can't enumerate accounts by probing this endpoint.
tags: [Auth]
security: []

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [email]
                properties:
                    email:
                        type: string
                        format: email
                        maxLength: 254
                        examples: ["ali@example.ir"]

responses:
    "204":
        description: Acknowledged. The email was sent if a matching account exists.
    "422":
        $ref: "../../../common/components/responses/ValidationError.yaml"
