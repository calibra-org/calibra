operationId: authPasswordReset
summary: Complete a password reset
description: >
    Consumes the token emailed by `POST /auth/password/forgot` and sets a new password on the
    matching user. The token is single-use — a successful reset invalidates it and any older
    tokens for the same user. All existing bearer sessions for the user are revoked.
tags: [Auth]
security: []

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [token, password]
                properties:
                    token:
                        type: string
                        description: Opaque reset token from the email.
                    password:
                        type: string
                        minLength: 8
                        maxLength: 128
                        description: New password (same policy as registration).

responses:
    "204":
        description: Password updated; the caller must log in again.
    "400":
        $ref: "../../../common/components/responses/BadRequest.yaml"
    "422":
        $ref: "../../../common/components/responses/ValidationError.yaml"
