operationId: authRegister
summary: Register a new customer
description: >
    Creates the `users` + `customers` rows in a single transaction and returns an opaque bearer
    token so the storefront can move straight into the authenticated experience. Email uniqueness
    is case-insensitive (the underlying column is `citext`). Phone numbers are normalized
    server-side using the supplied country (defaults to `IR`).
tags: [Auth]
security: []

parameters:
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [email, password, first_name, last_name]
                properties:
                    email:
                        type: string
                        format: email
                        maxLength: 254
                        examples: ["ali@example.ir"]
                    password:
                        type: string
                        minLength: 8
                        maxLength: 128
                        description: "At least 8 chars, must contain a letter and a digit."
                        examples: ["Password123"]
                    first_name:
                        type: string
                        minLength: 1
                        maxLength: 80
                        examples: ["علی", "Ali"]
                    last_name:
                        type: string
                        minLength: 1
                        maxLength: 80
                        examples: ["محمدی", "Mohammadi"]
                    phone:
                        type: [string, "null"]
                        description: Normalized to E.164 server-side using `country_default`.
                        examples: ["09121234567"]
                    country_default:
                        type: string
                        minLength: 2
                        maxLength: 2
                        default: "IR"
                        description: ISO-3166-1 alpha-2 country code.
                        examples: ["IR"]

responses:
    "201":
        description: Account created. The response carries the bearer token and the new profile.
        content:
            application/json:
                schema:
                    type: object
                    required: [user, customer, token]
                    properties:
                        user:
                            type: object
                            properties:
                                id: { type: integer }
                                email: { type: string }
                                role: { type: string, examples: ["customer"] }
                                locale: { type: string, examples: ["fa", "en"] }
                        customer:
                            type: object
                            properties:
                                id: { type: integer }
                                user_id: { type: integer }
                                first_name: { type: string }
                                last_name: { type: string }
                                phone: { type: [string, "null"] }
                                country_default: { type: string }
                        token:
                            type: object
                            required: [type, value]
                            properties:
                                type: { type: string, examples: ["bearer"] }
                                value: { type: string, description: Opaque token. }
                                expires_at: { type: [string, "null"], format: date-time }
    "422":
        $ref: "../../../common/components/responses/ValidationError.yaml"
