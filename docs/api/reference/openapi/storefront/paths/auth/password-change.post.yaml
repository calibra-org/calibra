operationId: authPasswordChange
summary: Change password (authenticated)
description: The authenticated user sets a new password and clears the forced-change flag. This is where the 423 `E_PASSWORD_CHANGE_REQUIRED` gate steers a freshly-provisioned operator.
tags: [Auth]
security:
    - BearerAuth: []
requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [password]
                properties:
                    password: { type: string, minLength: 8, maxLength: 128 }
responses:
    "200":
        description: Password changed.
        content:
            application/json:
                schema:
                    type: object
                    required: [message]
                    properties: { message: { type: string } }
    "401":
        $ref: "../../../common/components/responses/Unauthorized.yaml"
    "422":
        $ref: "../../../common/components/responses/ValidationError.yaml"
