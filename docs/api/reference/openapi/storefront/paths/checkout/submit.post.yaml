operationId: checkoutSubmit
summary: Submit the draft order (draft → pending)
description: >
    Atomic finalize: re-snapshots prices and surfaces 409 `E_PRICE_CHANGED` on drift; reserves
    stock; allocates an `order_key`; writes the coupon redemption ledger (with FOR UPDATE locking
    on the coupon row); transitions the order to `pending`; clears the source cart. Pass
    `Idempotency-Key` so a retry returns the same order instead of double-submitting. The
    response carries the order detail and a `payment.redirect_url` placeholder — the actual
    payment URL is produced by `POST /payment/init/:order_key`.
tags: [Checkout]
security: []

parameters:
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"
    - $ref: "../../../common/components/parameters/IdempotencyKeyHeader.yaml"

responses:
    "200":
        description: Order finalized.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, payment]
                    properties:
                        data: { $ref: "../../components/schemas/OrderDetail.yaml" }
                        payment: { $ref: "../../components/schemas/PaymentInfo.yaml" }
    "409":
        $ref: "../../../common/components/responses/Conflict.yaml"
    "422":
        $ref: "../../../common/components/responses/ValidationError.yaml"
