operationId: accountDownloadsIndex
summary: List the customer's active download grants
description: >
    Paginated list of every download grant whose `expires_at` is null or still in the future, on
    the unified TableView grammar. Customer-scope + active-grant predicate are pre-applied as
    security invariants — expired grants and cross-tenant rows never leak through this endpoint
    regardless of the wire `filter[]`. The companion `GET /account/downloads/:id/url` mints a
    short-lived signed URL when the customer is ready to download.

    **TableView filterable fields**: `id`, `product_id`, `granted_at`, `expires_at`.

    **TableView orderable fields**: `id`, `granted_at`, `expires_at`. Default sort is
    `granted_at` descending.
tags: [Account]

parameters:
    - $ref: "../../../common/components/parameters/table-view/Page.yaml"
    - $ref: "../../../common/components/parameters/table-view/Limit.yaml"
    - $ref: "../../../common/components/parameters/table-view/Filter.yaml"
    - $ref: "../../../common/components/parameters/table-view/FilterOr.yaml"
    - $ref: "../../../common/components/parameters/table-view/Sort.yaml"

responses:
    "200":
        description: Paginated download grants.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, meta]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/CustomerDownload.yaml" }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
    "401":
        $ref: "../../../common/components/responses/Unauthorized.yaml"
    "404":
        $ref: "../../../common/components/responses/NotFound.yaml"
