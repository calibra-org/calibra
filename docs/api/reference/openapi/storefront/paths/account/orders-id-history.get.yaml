operationId: accountOrdersHistory
summary: Customer-visible order timeline
description: >
    Paginated public-safe order status timeline for an order owned by the authenticated
    customer, on the unified TableView grammar. Drops the actor (`changed_by_user_id`) and the
    free-text `reason` field (which may carry internal operator context) and adds a `label_key`
    the storefront resolves through its own i18n catalog (Pattern 4 — the API never returns
    translated labels, only the key + the raw status value). Cross-tenant access returns 404,
    never 403.

    **TableView filterable fields**: `id`, `from_status`, `to_status`, `occurred_at`.

    **TableView orderable fields**: `id`, `occurred_at`.
tags: [Account]

parameters:
    - { name: id, in: path, required: true, schema: { type: integer } }
    - $ref: "../../../common/components/parameters/table-view/Page.yaml"
    - $ref: "../../../common/components/parameters/table-view/Limit.yaml"
    - $ref: "../../../common/components/parameters/table-view/Filter.yaml"
    - $ref: "../../../common/components/parameters/table-view/FilterOr.yaml"
    - $ref: "../../../common/components/parameters/table-view/Sort.yaml"

responses:
    "200":
        description: Paginated customer-visible status history.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, meta]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/OrderHistoryEntry.yaml" }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
    "401":
        $ref: "../../../common/components/responses/Unauthorized.yaml"
    "404":
        $ref: "../../../common/components/responses/NotFound.yaml"
