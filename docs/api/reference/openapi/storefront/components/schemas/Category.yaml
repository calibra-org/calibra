title: Category
description: Catalog category. Hierarchical via `parent_id`; tree depth is unbounded server-side.
type: object
properties:
    id: { type: integer }
    parent_id: { type: [integer, "null"] }
    slug: { type: string, examples: ["smartphones"] }
    name: { type: string, description: Resolved from the active locale. }
    description: { type: [string, "null"] }
    image:
        anyOf:
            - type: object
              properties:
                  url: { type: string }
                  alt: { type: [string, "null"] }
            - type: "null"
required:
    - id
    - slug
    - name
