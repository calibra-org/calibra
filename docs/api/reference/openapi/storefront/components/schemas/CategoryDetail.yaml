title: CategoryDetail
description: >
    Single category resolved by localised slug. Matches the storefront `ProductCategoryTransformer.toObject()`
    output exactly.
type: object
properties:
    id: { type: integer }
    parent_id: { type: [integer, "null"] }
    display: { type: [string, "null"], description: "Display style (e.g. `default`, `products`, `subcategories`)." }
    image_media_id: { type: [integer, "null"] }
    menu_order: { type: integer }
    name: { type: [string, "null"] }
    slug: { type: [string, "null"] }
    description: { type: [string, "null"] }
    locale: { type: string }
required:
    - id
    - menu_order
    - locale
