title: Order
description: >
    Customer-facing order card — matches `OrderTransformer.forList()` exactly. Returned by
    `/account/orders` listings. The detail variant `OrderDetail` adds line items, shipping +
    tax lines, billing/shipping addresses, customer-visible status history, and customer
    notes. Money fields are in Rial minor units.
type: object
properties:
    id: { type: integer }
    order_number:
        type: integer
        description: Sequence-allocated, gap-free human-facing reference (independent of `id`).
        examples: [1042]
    status:
        type: string
        enum: [draft, pending, on_hold, processing, completed, cancelled, refunded, failed]
    currency: { type: string, examples: ["IRR"] }
    currency_display: { type: string, examples: ["IRT", "IRR"] }
    grand_total: { type: integer }
    items_total: { type: integer }
    shipping_total: { type: integer }
    tax_total: { type: integer }
    discount_total: { type: integer }
    created_via: { type: string, description: "How the order was placed (e.g. `checkout`, `admin`)." }
    date_paid_at: { type: [string, "null"], format: date-time }
    date_completed_at: { type: [string, "null"], format: date-time }
    created_at: { type: [string, "null"], format: date-time }
    updated_at: { type: [string, "null"], format: date-time }
required:
    - id
    - order_number
    - status
    - currency
    - currency_display
    - grand_total
    - items_total
    - shipping_total
    - tax_total
    - discount_total
    - created_via
