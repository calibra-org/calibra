title: CustomerDownload
description: >
    Download grant row from the customer's downloads list. One row per `(product_id,
    product_download_id, order_id)` triple. `expires_at: null` means the grant has no fixed
    expiry; `download_limit: null` means unlimited downloads. IDs are BIGINT, serialised as
    strings by Lucid.
type: object
properties:
    id: { type: string }
    product_id: { type: [string, "null"] }
    product_download_id: { type: [string, "null"] }
    order_id: { type: [string, "null"] }
    granted_at: { type: [string, "null"], format: date-time }
    expires_at: { type: [string, "null"], format: date-time }
    download_limit: { type: [integer, "null"] }
    downloads_used: { type: integer }
required:
    - id
    - downloads_used
