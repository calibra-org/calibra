title: ProductVariationStorefront
description: >
    Storefront variation row, matching `ProductVariationTransformer.toObject()` exactly — flat
    money fields (`regular_price`, `sale_price`, `effective_price`, `on_sale`), dimensions, and
    the `attribute_pins` array that ties this variation to its parent's attribute terms.
type: object
properties:
    id: { type: integer }
    product_id: { type: integer }
    sku: { type: [string, "null"] }
    regular_price: { type: [integer, "null"] }
    sale_price: { type: [integer, "null"] }
    sale_starts_at: { type: [string, "null"], format: date-time }
    sale_ends_at: { type: [string, "null"], format: date-time }
    effective_price: { type: [integer, "null"] }
    on_sale: { type: boolean }
    weight_grams: { type: [integer, "null"] }
    length_mm: { type: [integer, "null"] }
    width_mm: { type: [integer, "null"] }
    height_mm: { type: [integer, "null"] }
    image_media_id: { type: [integer, "null"] }
    virtual: { type: boolean }
    downloadable: { type: boolean }
    tax_class_id: { type: [integer, "null"] }
    manage_stock_mode: { type: string }
    menu_order: { type: integer }
    description: { type: [string, "null"] }
    attribute_pins:
        type: array
        items:
            type: object
            required: [attribute_id, term_id]
            properties:
                attribute_id: { type: integer }
                term_id: { type: integer }
required:
    - id
    - product_id
    - on_sale
    - virtual
    - downloadable
    - manage_stock_mode
    - menu_order
    - attribute_pins
