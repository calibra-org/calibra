title: AuthUser
description: Authenticated user identity returned by `GET /auth/me` and `GET /account/me`. Password hash never leaks — the transformer never picks it.
type: object
properties:
    id:
        type: string
        description: BIGINT id serialised as a string (Lucid default).
    email:
        type: [string, "null"]
        format: email
        description: Null for phone-OTP shoppers who registered without an email.
    locale: { type: string }
    role: { type: string }
    must_change_password:
        type: boolean
        description: True when the operator must set a new password before using admin routes (mirrors the 423 gate).
    created_at: { type: [string, "null"], format: date-time }
    updated_at: { type: [string, "null"], format: date-time }
required:
    - id
    - email
    - locale
    - role
