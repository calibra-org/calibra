openapi: 3.1.0

info:
    title: Calibra Admin API
    version: "1.0.0"
    description: >
        Authenticated admin REST API for the Calibra commerce backend — used by `apps/admin/`.
        Every operation requires a bearer token belonging to a user with admin privileges and
        returns 401 / 403 otherwise. The locale and money conventions match the storefront API:
        Persian (`fa`) by default, English under `Accept-Language: en`; money is in Rial minor
        units.

        ## Conventions

        - **Pagination.** `page` / `perPage` query params; `{ data, meta }` envelope.
        - **Money.** Rial minor units (BIGINT) for every monetary field.
        - **Auth.** Every endpoint requires `Authorization: Bearer <token>` from an admin user.
        - **Idempotency.** `POST /orders/:id/refunds` accepts `Idempotency-Key` so retries don't
          double-issue refunds.
        - **HEAD methods.** AdonisJS auto-registers a `HEAD` handler for every `GET` route. Each
          `head:` entry below is a documentation companion that returns the same headers as the
          paired `get:` operation with an empty body.
    contact:
        name: Calibra Backend Team
        url: https://calibra.dev/support
        email: support@calibra.dev
    license:
        name: "UNLICENSED (Proprietary)"

servers:
    - url: http://localhost:3333
      description: Local development
    - url: https://api.calibra.dev
      description: Production

tags:
    - name: Admin / Orders
      description: Orders, line items, status transitions, status history.
    - name: Admin / Refunds
      description: Refund issuance and retrieval.
    - name: Admin / Notes
      description: Order notes (internal + customer-facing).
    - name: Admin / Coupons
      description: Coupon CRUD.
    - name: Admin / Customers
      description: Customer listing and detail.
    - name: Admin / Payments
      description: Read-only payment-gateway registry and payment-attempt audit log.
    - name: Admin / Catalog / Products
      description: Product CRUD + duplication + batch operations.
    - name: Admin / Catalog / Variations
      description: Variation CRUD on a parent variable product.
    - name: Admin / Catalog / Attributes
      description: Attribute and attribute-term CRUD.
    - name: Admin / Catalog / Categories
      description: Category taxonomy CRUD.
    - name: Admin / Catalog / Tags
      description: Tag taxonomy CRUD.
    - name: Admin / Catalog / Brands
      description: Brand taxonomy CRUD.
    - name: Admin / Catalog / Shipping Classes
      description: Shipping-class CRUD.
    - name: Admin / Catalog / Reviews
      description: Review moderation.
    - name: Admin / Media
      description: Media library — list, upload, edit metadata, delete.
    - name: Admin / Reports
      description: Dashboard-shaped aggregations (top sellers, …). Narrow surface, not a BI replacement.
    - name: Admin / Insights
      description: >
          Cross-cutting dashboard summaries (customer summary, …). Pairs a current snapshot with a
          30-day delta and a daily sparkline so the dashboard tiles can render without further
          rollup math on the client.

