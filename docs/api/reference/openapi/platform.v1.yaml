openapi: 3.1.0

info:
    title: Calibra Platform (Control-Plane) API
    version: "1.0.0"
    description: >
        Control-plane REST API for the Calibra multi-tenant SaaS. These endpoints are operated by
        **platform** staff (not shop staff or shoppers) and live under `/api/v1/platform/*`. They are
        global — `tenant_context_middleware` skips them, so no tenant RLS context is established.

        ## Conventions

        - **Auth.** Operators authenticate with a `pat_`-prefixed token on the dedicated `platform`
          guard (`platform_access_tokens`). A shopper/shop-admin bearer token can NEVER authenticate
          here — it returns 401. Obtain a token from `POST /api/v1/platform/auth/login`.
        - **Envelopes.** Successful responses return `{ data: ... }`, matching the storefront/admin
          surfaces.
        - **Impersonation.** `POST /tenants/{id}/impersonate` mints a short-lived tenant-scoped
          shop-admin token carrying an `impersonated_by:<operatorId>` ability and audits the action.
    contact:
        name: Calibra Backend Team
        url: https://calibra.dev/support
        email: support@calibra.dev
    license:
        name: "UNLICENSED (Proprietary)"

servers:
    - url: http://localhost:3333
      description: Local development
    - url: https://api.calibra.dev
      description: Production

tags:
    - name: Platform Auth
      description: Control-plane operator login.
    - name: Platform Overview
      description: Fleet-wide rollups for the console home.
    - name: Platform Tenants
      description: Provision, inspect, and manage shops (and impersonate their staff).
    - name: Platform Domains
      description: Attach, detach, and re-probe a tenant's custom domains + TLS status.
    - name: Platform Metrics
      description: Native per-tenant business KPIs + usage time series.
    - name: Platform Plans
      description: Manage subscription plan tiers, limits, and db_tier.

components:
    securitySchemes:
        PlatformAuth:
            $ref: "./platform/components/securitySchemes/PlatformAuth.yaml"

security:
    - PlatformAuth: []

paths:
    /api/v1/platform/auth/login:
        post:
            $ref: "./platform/paths/auth/login.post.yaml"
    /api/v1/platform/overview:
        get:
            $ref: "./platform/paths/overview/overview.get.yaml"
        head:
            $ref: "./common/components/operations/HeadCompanion.yaml"
    /api/v1/platform/tenants:
        get:
            $ref: "./platform/paths/tenants/tenants.get.yaml"
        head:
            $ref: "./common/components/operations/HeadCompanion.yaml"
        post:
            $ref: "./platform/paths/tenants/tenants.post.yaml"
    /api/v1/platform/tenants/{id}:
        get:
            $ref: "./platform/paths/tenants/tenants-id.get.yaml"
        head:
            $ref: "./common/components/operations/HeadCompanion.yaml"
        patch:
            $ref: "./platform/paths/tenants/tenants-id.patch.yaml"
    /api/v1/platform/tenants/{id}/impersonate:
        post:
            $ref: "./platform/paths/tenants/tenants-id-impersonate.post.yaml"
    /api/v1/platform/tenants/{id}/metrics:
        get:
            $ref: "./platform/paths/tenants/tenants-id-metrics.get.yaml"
        head:
            $ref: "./common/components/operations/HeadCompanion.yaml"
    /api/v1/platform/tenants/{id}/domains:
        post:
            $ref: "./platform/paths/tenants/tenants-id-domains.post.yaml"
    /api/v1/platform/tenants/{id}/domains/{domainId}:
        delete:
            $ref: "./platform/paths/tenants/tenants-id-domains-domainId.delete.yaml"
    /api/v1/platform/tenants/{id}/domains/{domainId}/recheck:
        post:
            $ref: "./platform/paths/tenants/tenants-id-domains-domainId-recheck.post.yaml"
    /api/v1/platform/plans:
        get:
            $ref: "./platform/paths/plans/plans.get.yaml"
        head:
            $ref: "./common/components/operations/HeadCompanion.yaml"
        post:
            $ref: "./platform/paths/plans/plans.post.yaml"
    /api/v1/platform/plans/{id}:
        patch:
            $ref: "./platform/paths/plans/plans-id.patch.yaml"
    /api/v1/platform/tickets:
        get:
            $ref: "./platform/paths/tickets/tickets.get.yaml"
        head:
            $ref: "./common/components/operations/HeadCompanion.yaml"
    /api/v1/platform/tickets/{id}:
        get:
            $ref: "./platform/paths/tickets/tickets-id.get.yaml"
        head:
            $ref: "./common/components/operations/HeadCompanion.yaml"
        patch:
            $ref: "./platform/paths/tickets/tickets-id.patch.yaml"
    /api/v1/platform/tickets/{id}/messages:
        post:
            $ref: "./platform/paths/tickets/tickets-id-messages.post.yaml"
