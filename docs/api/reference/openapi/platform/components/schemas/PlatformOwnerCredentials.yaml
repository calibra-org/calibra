title: PlatformOwnerCredentials
description: Reveal-once owner credentials returned on provisioning. `temp_password` is shown exactly
    once (null when an explicit password was supplied); the durable backstop is single-use +
    `must_change_password`.
type: object
properties:
    email: { type: [string, "null"], format: email }
    temp_password: { type: [string, "null"] }
    must_change_password: { type: boolean }
required: [email, temp_password, must_change_password]
