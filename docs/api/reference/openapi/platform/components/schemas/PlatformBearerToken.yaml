title: PlatformBearerToken
description: >
    Opaque control-plane bearer token (`pat_` prefix). The `value` is single-use cleartext returned
    once at login or impersonation; store it and send as `Authorization: Bearer <value>`.
type: object
properties:
    type:
        type: string
        description: Always `bearer`.
        examples: ["bearer"]
    value:
        type: string
        description: Opaque token. Treat as a credential — never log or display.
    expires_at:
        type: [string, "null"]
        format: date-time
        description: Null when the token has no fixed expiry.
required:
    - type
    - value
