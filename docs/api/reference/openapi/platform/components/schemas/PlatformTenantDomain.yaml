title: PlatformTenantDomain
description: A hostname mapped to a tenant. `subdomain` rows are auto-provisioned (one primary per
    tenant); `custom` rows are operator-attached and start `tls_status=pending` until the edge issues
    a certificate (Phase 6). `cname_target` is present on attach/recheck responses — the CNAME the
    operator must create.
type: object
properties:
    id: { type: integer }
    domain: { type: string, examples: ["shop.example.com"] }
    kind: { type: string, enum: [subdomain, custom] }
    is_primary: { type: boolean }
    tls_status: { type: string, enum: [pending, active, failed] }
    verified_at: { type: [string, "null"], format: date-time }
    created_at: { type: string, format: date-time }
    cname_target: { type: string, description: "CNAME target for a custom domain.", examples: ["aurora.shops.calibra.app"] }
required: [id, domain, kind, is_primary, tls_status, verified_at, created_at]
