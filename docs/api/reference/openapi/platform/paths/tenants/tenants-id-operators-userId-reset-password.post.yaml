operationId: platformOperatorsResetPassword
summary: Rotate an operator's password
description: Generates a fresh temp password, forces a change, revokes the operator's sessions, and reveals the new password once.
tags: [Platform Operators]
security:
    - PlatformAuth: []
parameters:
    - { name: id, in: path, required: true, schema: { type: integer } }
    - { name: userId, in: path, required: true, schema: { type: integer } }
responses:
    "200":
        description: Password rotated.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            type: object
                            required: [temp_password, must_change_password]
                            properties:
                                temp_password: { type: string }
                                must_change_password: { type: boolean }
    "401":
        $ref: "../../../common/components/responses/Unauthorized.yaml"
    "404":
        $ref: "../../../common/components/responses/NotFound.yaml"
