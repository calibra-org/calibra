operationId: platformTenantDomainsRecheck
summary: Re-probe a domain's TLS/verification status
description: Re-reads the domain's current verification + TLS status. Phase 6 flips pending → active
    once the edge issues a certificate; in Phase 5 this reflects the stored status.
tags: [Platform Domains]
security:
    - PlatformAuth: []
parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    - name: domainId
      in: path
      required: true
      schema: { type: integer }
responses:
    "200":
        description: Current domain status.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/PlatformTenantDomain.yaml" }
    "401":
        $ref: "../../../common/components/responses/Unauthorized.yaml"
    "404":
        $ref: "../../../common/components/responses/NotFound.yaml"
