title: AdminOrderDetail
description: >
    Admin order detail payload. Matches `OrderTransformer.forAdmin()` exactly —
    `forDetail()` plus `ip_address`, `user_agent`, and a (currently always-null)
    `cart_hash` audit field. Money is integer Rial minor units.
allOf:
    - $ref: "../../../storefront/components/schemas/OrderDetail.yaml"
    - type: object
      required: [cart_hash]
      properties:
          ip_address: { type: [string, "null"] }
          user_agent: { type: [string, "null"] }
          cart_hash:
              type: [string, "null"]
              description: Always null — the column is reserved for a future cart-anti-tamper check.
