title: TicketTag
description: >
    Conversation tag — matches `TicketTagTransformer.toObject()`. A free-text label with an
    optional display color, attached to conversations through the tag pivot.
type: object
properties:
    id: { type: string }
    name: { type: string }
    color: { type: [string, "null"] }
required: [id, name]
