title: AdminProductDetail
description: >
    Admin detail-page payload for a single product. Matches `ProductTransformer.forAdmin()`
    exactly — the storefront detail shape extended with every translation row, the
    `global_unique_id`, the free-form `attributes` map, and the audit timestamps.
allOf:
    - $ref: "./AdminProduct.yaml"
    - type: object
      properties:
          description: { type: [string, "null"] }
          purchase_note: { type: [string, "null"] }
          global_unique_id: { type: [string, "null"] }
          attributes:
              type: object
              additionalProperties: true
              description: Free-form metadata bag.
          images:
              type: array
              items:
                  type: object
                  required: [id, media_id, position]
                  properties:
                      id: { type: integer }
                      media_id: { type: integer }
                      position: { type: integer }
                      url: { type: [string, "null"] }
                      alt: { type: [string, "null"] }
          variations:
              type: array
              description: Present only when `type=variable`.
              items:
                  type: object
                  required: [id, on_sale, manage_stock_mode, attribute_pins]
                  properties:
                      id: { type: integer }
                      sku: { type: [string, "null"] }
                      regular_price: { type: [integer, "null"] }
                      sale_price: { type: [integer, "null"] }
                      effective_price: { type: [integer, "null"] }
                      on_sale: { type: boolean }
                      manage_stock_mode: { type: string }
                      attribute_pins:
                          type: array
                          items:
                              type: object
                              required: [attribute_id, term_id]
                              properties:
                                  attribute_id: { type: integer }
                                  term_id: { type: integer }
          attribute_links:
              type: array
              items:
                  type: object
                  required: [id, attribute_id, position, visible, used_for_variation, term_ids]
                  properties:
                      id: { type: integer }
                      attribute_id: { type: integer }
                      position: { type: integer }
                      visible: { type: boolean }
                      used_for_variation: { type: boolean }
                      term_ids:
                          type: array
                          items: { type: integer }
          custom_attributes:
              type: array
              description: >
                  Per-product attributes (name + chip values) that have no global taxonomy
                  counterpart and never feed variation generation.
              items: { $ref: "./AdminCustomAttribute.yaml" }
          categories:
              type: array
              items:
                  type: object
                  required: [id]
                  properties:
                      id: { type: integer }
                      name: { type: [string, "null"] }
                      slug: { type: [string, "null"] }
          tags:
              type: array
              items:
                  type: object
                  required: [id]
                  properties:
                      id: { type: integer }
                      name: { type: [string, "null"] }
                      slug: { type: [string, "null"] }
          brands:
              type: array
              items:
                  type: object
                  required: [id]
                  properties:
                      id: { type: integer }
                      name: { type: [string, "null"] }
                      slug: { type: [string, "null"] }
          translations:
              type: array
              items:
                  type: object
                  properties:
                      locale: { type: string }
                      name: { type: string }
                      slug: { type: string }
                      description: { type: [string, "null"] }
                      short_description: { type: [string, "null"] }
                      purchase_note: { type: [string, "null"] }
                      external_button_text: { type: [string, "null"] }
          default_variation_id:
              type: [integer, "null"]
              description: >
                  Variation pre-selected on the storefront product page. Set to null to let the
                  storefront pick the first available variation.
          pos_available:
              type: boolean
              description: >
                  Whether this product can be sold via the in-store POS app. Decoupled from the
                  storefront `status` / `catalog_visibility` axes — a product can be Published online
                  but hidden from POS, or vice versa.
          upsell_ids:
              type: array
              description: Recommended-next-step product ids, ordered by `position`.
              items: { type: integer }
          cross_sell_ids:
              type: array
              description: Cart upsell product ids, ordered by `position`.
              items: { type: integer }
          grouped_member_ids:
              type: array
              description: Member-product ids for `type=grouped` bundles, ordered by `position`.
              items: { type: integer }
          downloads:
              type: array
              items:
                  type: object
                  required: [id, media_id, file_label, position]
                  properties:
                      id: { type: integer }
                      media_id: { type: integer }
                      file_label: { type: string }
                      download_limit: { type: [integer, "null"] }
                      download_expiry_days: { type: [integer, "null"] }
                      position: { type: integer }
                      url: { type: [string, "null"] }
          created_at: { type: [string, "null"], format: date-time }
          updated_at: { type: [string, "null"], format: date-time }
          deleted_at: { type: [string, "null"], format: date-time }
