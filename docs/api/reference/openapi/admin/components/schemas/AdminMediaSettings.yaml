title: AdminMediaSettings
description: >
    The admin Settings → Media tab. Image-size presets (thumbnail / medium / large) the upload
    pipeline resizes every new image into, plus upload options. `thumbnail.crop` hard-crops to exact
    dimensions; medium/large are bounded (aspect preserved). `uploads.organize_by_date` toggles the
    `{yyyy}/{mm}` storage folder layout; `max_upload_mb` caps a single upload.
type: object
required: [thumbnail, medium, large, uploads]
properties:
    thumbnail:
        type: object
        required: [width, height, crop]
        properties:
            width: { type: integer, minimum: 1, examples: [150] }
            height: { type: integer, minimum: 1, examples: [150] }
            crop: { type: boolean }
    medium:
        type: object
        required: [width, height]
        properties:
            width: { type: integer, minimum: 1, examples: [300] }
            height: { type: integer, minimum: 1, examples: [300] }
    large:
        type: object
        required: [width, height]
        properties:
            width: { type: integer, minimum: 1, examples: [1024] }
            height: { type: integer, minimum: 1, examples: [1024] }
    uploads:
        type: object
        required: [organize_by_date, max_upload_mb]
        properties:
            organize_by_date: { type: boolean }
            max_upload_mb: { type: integer, minimum: 1, examples: [20] }
