title: AdminAttribute
description: >
    Catalog attribute — matches `ProductAttributeTransformer.forAdmin()` exactly. Terms are
    nested under each attribute via `/api/v1/admin/attributes/{id}/terms`. The `code` is the
    stable internal handle (Calibra does NOT prefix with `pa_` à la WooCommerce); `name`
    is resolved from the active locale, and `translations` carries every locale row.
type: object
properties:
    id: { type: integer }
    code: { type: string, examples: ["color", "storage"] }
    order_by: { type: string }
    has_archives: { type: boolean }
    name: { type: string }
    locale: { type: string }
    translations:
        type: array
        items:
            type: object
            required: [locale, name]
            properties:
                locale: { type: string }
                name: { type: string }
    created_at: { type: [string, "null"], format: date-time }
    updated_at: { type: [string, "null"], format: date-time }
required:
    - id
    - code
    - order_by
    - has_archives
    - name
    - locale
