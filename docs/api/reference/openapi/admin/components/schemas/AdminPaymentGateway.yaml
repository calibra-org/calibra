title: AdminPaymentGateway
description: >
    Payment gateway registry row — matches `PaymentGatewayTransformer.forAdmin()` exactly.
    The base `forStorefront()` shape (`id`, `code`, `enabled`, `ordering`, `supports`,
    `implementation_status`) is augmented with `settings` (sensitive keys masked to `"***"`
    on GET; PATCH accepts unmasked values for rotation) and audit timestamps.
type: object
properties:
    id: { type: integer }
    code:
        type: string
        description: Stable adapter code (e.g. `bank_transfer`, `zarinpal`).
    enabled: { type: boolean }
    ordering: { type: integer }
    supports:
        type: object
        description: Adapter-reported capability flags (`refunds`, `partial_refunds`, …).
        additionalProperties: true
    implementation_status:
        type: string
        enum: [stub, live]
        description: >
            `"stub"` — the registry knows about the PSP but every lifecycle method throws
            `E_GATEWAY_NOT_IMPLEMENTED`; the admin UI disables the enable toggle and the
            storefront refuses to submit against the row. `"live"` — the adapter is a real
            integration (today: `cod`, `bank_transfer`). PSP integrations land via follow-up
            PRs that ship a real adapter and bump this field to `"live"`.
    settings:
        type: object
        description: Free-form per-gateway settings. Sensitive keys masked to `"***"` on GET.
        additionalProperties: true
    created_at: { type: [string, "null"], format: date-time }
    updated_at: { type: [string, "null"], format: date-time }
required:
    - id
    - code
    - enabled
    - ordering
    - supports
    - implementation_status
    - settings
