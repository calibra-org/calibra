title: UserAdmin
description: >
    User identity as the admin surface sees it — matches `UserTransformer.forAdmin()`
    exactly. Extends the storefront `AuthUser` shape with the audit columns
    (`last_login_at`, `deleted_at`) the operator needs when inspecting an account. The
    password hash is never picked by the transformer, so it cannot leak.
type: object
properties:
    id: { type: string }
    email: { type: string, format: email }
    locale: { type: string }
    role: { type: string }
    created_at: { type: [string, "null"], format: date-time }
    updated_at: { type: [string, "null"], format: date-time }
    last_login_at: { type: [string, "null"], format: date-time }
    deleted_at: { type: [string, "null"], format: date-time }
required:
    - id
    - email
    - locale
    - role
