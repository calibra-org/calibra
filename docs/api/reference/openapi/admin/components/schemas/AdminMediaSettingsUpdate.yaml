title: AdminMediaSettingsUpdate
description: >
    Partial update for the Media settings tab. Every section and field is optional — the server
    writes only what changed (same-value writes are no-ops). Widths/heights are pixel bounds
    (1–4096); `max_upload_mb` is 1–100.
type: object
properties:
    thumbnail:
        type: object
        properties:
            width: { type: integer, minimum: 1, maximum: 4096 }
            height: { type: integer, minimum: 1, maximum: 4096 }
            crop: { type: boolean }
    medium:
        type: object
        properties:
            width: { type: integer, minimum: 1, maximum: 4096 }
            height: { type: integer, minimum: 1, maximum: 4096 }
    large:
        type: object
        properties:
            width: { type: integer, minimum: 1, maximum: 4096 }
            height: { type: integer, minimum: 1, maximum: 4096 }
    uploads:
        type: object
        properties:
            organize_by_date: { type: boolean }
            max_upload_mb: { type: integer, minimum: 1, maximum: 100 }
