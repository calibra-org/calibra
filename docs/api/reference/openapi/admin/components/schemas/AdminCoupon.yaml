title: AdminCoupon
description: >
    Coupon row with every rule the discounter consults: discount type, money/percent amounts,
    activation window, minimum/maximum cart spend, usage limits, individual-use flag, free-shipping
    flag, sale-item exclusion, and product/category/email constraints.
type: object
properties:
    id: { type: integer }
    code: { type: string, examples: ["WELCOME10", "FREESHIP"] }
    discount_type:
        type: string
        enum: [fixed_cart, fixed_product, percent, free_shipping]
    amount_minor:
        anyOf:
            - $ref: "../../../common/components/schemas/Money.yaml"
            - type: "null"
        description: Money amount for `fixed_*` types. Null for percent / free-shipping.
    amount_percent:
        type: [number, "null"]
        description: 0–100. Set only when `discount_type=percent`.
    status: { type: string, enum: [active, disabled] }
    starts_at: { type: [string, "null"], format: date-time }
    expires_at: { type: [string, "null"], format: date-time }
    minimum_amount:
        anyOf:
            - $ref: "../../../common/components/schemas/Money.yaml"
            - type: "null"
    maximum_amount:
        anyOf:
            - $ref: "../../../common/components/schemas/Money.yaml"
            - type: "null"
    individual_use: { type: boolean }
    exclude_sale_items: { type: boolean }
    usage_limit_global: { type: [integer, "null"] }
    usage_limit_per_user: { type: [integer, "null"] }
    limit_usage_to_x_items: { type: [integer, "null"] }
    free_shipping: { type: boolean }
    product_constraints:
        type: array
        items:
            type: object
            properties:
                product_id: { type: integer }
                mode: { type: string, enum: [include, exclude] }
    category_constraints:
        type: array
        items:
            type: object
            properties:
                category_id: { type: integer }
                mode: { type: string, enum: [include, exclude] }
    email_restrictions:
        type: array
        items: { type: string, description: "Email or glob pattern (e.g. `*@example.com`)." }
    redemptions_count: { type: integer, description: "Cumulative count of completed redemptions." }
    created_at: { type: string, format: date-time }
    updated_at: { type: string, format: date-time }
required:
    - id
    - code
    - discount_type
    - status
