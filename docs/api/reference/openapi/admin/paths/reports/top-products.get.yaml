operationId: adminReportsTopProducts
summary: Top-selling products (admin)
description: >
    Ranks products by gross revenue over a trailing window (default 30 days). Only `processing`
    and `completed` orders contribute — refunded / cancelled / failed / draft orders are excluded
    so the chart matches what the merchant actually billed. Names are resolved from the locale
    matching `Accept-Language`, falling back to the order's line-item name snapshot when no
    translation is available (so deleted-product bestsellers still render correctly).

    Window and result-size are capped (`days` ≤ 365, `limit` ≤ 50) to keep the aggregation
    bounded; it always scans the `order_line_items` ⋈ `orders` join, so very large windows are
    intentionally rejected upstream of the SQL.
tags: [Admin / Reports]

parameters:
    - name: days
      in: query
      description: Trailing window in days. Defaults to 30; capped at 365.
      schema: { type: integer, minimum: 1, maximum: 365, default: 30 }
    - name: limit
      in: query
      description: Maximum number of rows to return. Defaults to 5; capped at 50.
      schema: { type: integer, minimum: 1, maximum: 50, default: 5 }

responses:
    "200":
        description: Top products ranked by gross revenue, descending.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, range]
                    properties:
                        data:
                            type: array
                            items:
                                $ref: "../../../common/components/schemas/TopProduct.yaml"
                        range:
                            $ref: "../../../common/components/schemas/ReportRange.yaml"
    "401":
        $ref: "../../../common/components/responses/Unauthorized.yaml"
    "403":
        $ref: "../../../common/components/responses/Forbidden.yaml"
