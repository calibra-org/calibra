operationId: adminTicketsStoreInbox
summary: Create an inbox (admin)
description: >
    Creates a ticketing inbox bound to a channel type. Internal channels
    (`internal_web`, `internal_platform`) are always available. External messaging
    channels (`whatsapp`, `telegram`) may be unavailable in the current deployment region —
    those requests fail validation with code `E_NOT_AVAILABLE_IN_REGION`.
tags: [Admin / Tickets]
security:
    - BearerAuth: []

parameters:
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [name, channel_type]
                properties:
                    name: { type: string }
                    channel_type:
                        type: string
                        enum: [internal_web, internal_platform, whatsapp, telegram]

responses:
    "201":
        description: The created inbox.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            type: object
                            properties:
                                id: { type: string }
                                name: { type: string }
                                channel_type: { type: string }
                            required: [id, name, channel_type]
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "422":
        description: >
            Validation failed. External messaging channels unavailable in the current region
            return code `E_NOT_AVAILABLE_IN_REGION`.
        content:
            application/json:
                schema:
                    type: object
                    required: [errors]
                    properties:
                        errors:
                            type: array
                            items:
                                type: object
                                properties:
                                    message: { type: string }
                                    code: { type: string }
                                required: [message, code]
                examples:
                    region_blocked:
                        value:
                            errors:
                                - message: "WhatsApp inboxes are not available in this region."
                                  code: E_NOT_AVAILABLE_IN_REGION
