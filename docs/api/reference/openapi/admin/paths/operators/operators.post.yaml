operationId: adminOperatorsStore
summary: Invite an operator (Team)
description: Owner-only. Creates/reactivates an admin operator; reveals a temp password once, or returns a single-use handoff link when `handoff=true`.
tags: [Admin / Team]
security:
    - BearerAuth: []
requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [email]
                properties:
                    email: { type: string, format: email }
                    handoff: { type: boolean }
responses:
    "201":
        description: Operator created.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, credentials]
                    properties:
                        data: { $ref: "../../../common/components/schemas/Operator.yaml" }
                        credentials: { $ref: "../../../common/components/schemas/OperatorCredentialReveal.yaml" }
    "401":
        $ref: "../../../common/components/responses/Unauthorized.yaml"
    "403":
        $ref: "../../../common/components/responses/Forbidden.yaml"
    "409":
        $ref: "../../../common/components/responses/Conflict.yaml"
    "422":
        $ref: "../../../common/components/responses/ValidationError.yaml"
