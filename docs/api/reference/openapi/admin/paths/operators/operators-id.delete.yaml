operationId: adminOperatorsDestroy
summary: Remove an operator (Team)
description: Owner-only. Soft-deletes the operator + revokes sessions. The owner + last active admin are protected.
tags: [Admin / Team]
security:
    - BearerAuth: []
parameters:
    - { name: id, in: path, required: true, schema: { type: integer } }
responses:
    "200":
        description: Operator removed.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            type: object
                            required: [removed]
                            properties: { removed: { type: boolean } }
    "401":
        $ref: "../../../common/components/responses/Unauthorized.yaml"
    "403":
        $ref: "../../../common/components/responses/Forbidden.yaml"
    "404":
        $ref: "../../../common/components/responses/NotFound.yaml"
    "422":
        $ref: "../../../common/components/responses/ValidationError.yaml"
