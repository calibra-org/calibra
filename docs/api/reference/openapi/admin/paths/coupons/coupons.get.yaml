operationId: adminCouponsIndex
summary: List coupons (admin)
description: >
    Paginated list of coupons. Per-column filters + sort + pagination go through the unified
    TableView wire grammar. Bespoke filters (tab strip, free-text search, has_*_constraints
    existence checks, brand pivot whereIn, redemptions_min/max aggregate, expiring_soon
    horizon) stay as top-level params.


    **TableView filterable fields**: `id`, `code`, `status`, `discount_type`, `amount`,
    `minimum_amount`, `maximum_amount`, `free_shipping`, `individual_use`, `exclude_sale_items`,
    `usage_limit`, `usage_limit_per_user`, `starts_at`, `expires_at`, `created_at`.


    **TableView orderable fields**: `id`, `code`, `amount`, `starts_at`, `expires_at`,
    `created_at`, `updated_at`.


    Legacy `?perPage=` is mirrored to `limit`; legacy `?sort=` is no longer honoured (use
    `sort[]=field:dir`). Per-column filters previously at `?status=`, `?discount_type=`,
    `?free_shipping=`, `?min_amount_min=`, `?starts_after=`, etc. should move to
    `filter[]=status:eq:X`, `filter[]=minimum_amount:gte:N`, `filter[]=starts_at:gte:DATE`,
    and so on.
tags: [Admin / Coupons]

parameters:
    - $ref: "../../../common/components/parameters/table-view/Page.yaml"
    - $ref: "../../../common/components/parameters/table-view/Limit.yaml"
    - $ref: "../../../common/components/parameters/table-view/Filter.yaml"
    - $ref: "../../../common/components/parameters/table-view/FilterOr.yaml"
    - $ref: "../../../common/components/parameters/table-view/Sort.yaml"
    - { name: search, in: query, schema: { type: string }, description: Matches across coupon code and translated description. }
    - { name: tab, in: query, schema: { type: string, enum: [any, active, disabled, expired, scheduled, used, trashed] } }
    - { name: redemptions_min, in: query, schema: { type: integer } }
    - { name: redemptions_max, in: query, schema: { type: integer } }
    - { name: has_product_constraints, in: query, schema: { type: boolean } }
    - { name: has_category_constraints, in: query, schema: { type: boolean } }
    - { name: has_email_restrictions, in: query, schema: { type: boolean } }
    - { name: expiring_soon, in: query, schema: { type: boolean } }
    - {
          name: brand,
          in: query,
          schema: { type: array, items: { type: integer } },
          style: form,
          explode: false,
          description: Comma-separated brand ids.
      }

responses:
    "200":
        description: Paginated coupon list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, meta]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/AdminCoupon.yaml" }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
