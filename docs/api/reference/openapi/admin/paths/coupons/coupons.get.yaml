operationId: adminCouponsIndex
summary: List coupons (admin)
description: Paginated list of coupons. Filter by status, discount type, or free-text search across the code.
tags: [Admin / Coupons]

parameters:
    - $ref: "../../../common/components/parameters/PageQuery.yaml"
    - $ref: "../../../common/components/parameters/PerPageQuery.yaml"
    - { name: search, in: query, schema: { type: string }, description: Matches across coupon code and translated description. }
    - { name: tab, in: query, schema: { type: string, enum: [any, active, disabled, expired, scheduled, used, trashed] } }
    - { name: status, in: query, schema: { type: string, enum: [active, disabled] } }
    - {
          name: discount_type,
          in: query,
          schema: { type: array, items: { type: string, enum: [fixed_cart, fixed_product, percent, free_shipping] } },
          style: form,
          explode: false,
          description: Comma-separated list (`?discount_type=fixed_cart,percent`).
      }
    - { name: free_shipping, in: query, schema: { type: boolean } }
    - { name: individual_use, in: query, schema: { type: boolean } }
    - { name: exclude_sale_items, in: query, schema: { type: boolean } }
    - { name: min_amount_min, in: query, schema: { type: integer } }
    - { name: min_amount_max, in: query, schema: { type: integer } }
    - { name: max_amount_min, in: query, schema: { type: integer } }
    - { name: max_amount_max, in: query, schema: { type: integer } }
    - { name: starts_after, in: query, schema: { type: string, format: date-time } }
    - { name: starts_before, in: query, schema: { type: string, format: date-time } }
    - { name: expires_after, in: query, schema: { type: string, format: date-time } }
    - { name: expires_before, in: query, schema: { type: string, format: date-time } }
    - { name: redemptions_min, in: query, schema: { type: integer } }
    - { name: redemptions_max, in: query, schema: { type: integer } }
    - { name: has_product_constraints, in: query, schema: { type: boolean } }
    - { name: has_category_constraints, in: query, schema: { type: boolean } }
    - { name: has_email_restrictions, in: query, schema: { type: boolean } }
    - { name: expiring_soon, in: query, schema: { type: boolean } }
    - {
          name: brand,
          in: query,
          schema: { type: array, items: { type: integer } },
          style: form,
          explode: false,
          description: Comma-separated brand ids.
      }
    - {
          name: sort,
          in: query,
          schema: { type: string },
          description: "`column` for asc, `-column` for desc. Allowed: `code`, `discount_type`, `amount_minor`, `amount_percent`, `starts_at`, `expires_at`, `created_at`.",
      }

responses:
    "200":
        description: Paginated coupon list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, meta]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/AdminCoupon.yaml" }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
