operationId: adminCouponsTest
summary: Quick-test a coupon against a synthetic cart (admin)
description: >
    Runs the same eligibility + discount logic the cart-apply endpoint uses against an in-memory
    synthetic cart, with no DB writes and no redemption side-effects. Used by the editor's
    "Quick test" panel before flipping a coupon live.
tags: [Admin / Coupons]
parameters:
    - { name: id, in: path, required: true, schema: { type: integer } }
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"
requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [line_items]
                properties:
                    customer_id: { type: [integer, "null"] }
                    email: { type: [string, "null"], format: email }
                    line_items:
                        type: array
                        minItems: 1
                        items:
                            type: object
                            required: [product_id, quantity]
                            properties:
                                product_id: { type: integer }
                                quantity: { type: integer, minimum: 1 }
                                price_minor: { type: integer, minimum: 0 }
                    shipping_method_id: { type: [integer, "null"] }
                    country: { type: string, minLength: 2, maxLength: 2 }
responses:
    "200":
        description: Eligibility verdict plus an optional calculation block when eligible.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            type: object
                            required: [eligible]
                            properties:
                                eligible: { type: boolean }
                                reason: { type: string }
                                reason_message: { type: string }
                                calculation:
                                    type: object
                                    required: [items_subtotal_minor, discount_minor, shipping_minor, grand_total_minor]
                                    properties:
                                        items_subtotal_minor: { type: integer }
                                        discount_minor: { type: integer }
                                        shipping_minor: { type: integer }
                                        grand_total_minor: { type: integer }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
