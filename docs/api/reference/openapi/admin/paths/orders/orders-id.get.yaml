operationId: adminOrderShow
summary: Fetch an order (admin)
description: Returns the full admin order detail, including PSP-side identifiers, IP / user-agent, idempotency key, addresses, and money breakdown.
tags: [Admin / Orders]

parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"

responses:
    "200":
        description: Order detail envelope.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminOrderDetail.yaml" }
    "401":
        $ref: "../../../common/components/responses/Unauthorized.yaml"
    "403":
        $ref: "../../../common/components/responses/Forbidden.yaml"
    "404":
        $ref: "../../../common/components/responses/NotFound.yaml"
