operationId: adminOrderApplyCoupon
summary: Apply a coupon (admin)
description: Looks up the coupon, snapshots it as a coupon line on the order, and recomputes totals.
tags: [Admin / Orders]
parameters:
    - { name: id, in: path, required: true, schema: { type: integer } }
requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [code]
                properties:
                    code: { type: string, minLength: 1, maxLength: 80 }
responses:
    "201":
        description: Updated order envelope.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminOrderDetail.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
    "409":
        description: Coupon already applied to this order.
        content:
            application/json:
                schema: { $ref: "../../../common/components/schemas/BasicMessage.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
