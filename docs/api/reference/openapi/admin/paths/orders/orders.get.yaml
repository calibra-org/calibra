operationId: adminOrdersIndex
summary: List orders (admin)
description: >
    Paginated list of orders. Filter, sort, and paginate via the unified TableView wire grammar
    (`filter[]=field:op:value`, `filterOr[]=…`, `sort[]=field:dir`).


    **Filterable fields** (with allowed operators per type):
        `id` (bigint), `order_number` (bigint), `status` (enum: draft, pending, on_hold,
        processing, completed, cancelled, refunded, failed), `customer_id` (bigint),
        `created_via` (string), `payment_method_code_snapshot` (string), `billing_email`
        (string), `created_at` (datetime), `grand_total` (bigint), `date_paid_at` (datetime),
        `date_completed_at` (datetime).


    **Orderable fields**: `id`, `order_number`, `status`, `created_at`, `updated_at`,
    `grand_total`, `date_paid_at`, `date_completed_at`.


    Two extras outside the TableView grammar: `q` is a free-text search across
    `billing_email`, `order_number`, and `id`. `trashed=true` flips the soft-delete scope so
    only deleted orders are returned (default scope excludes deleted rows).


    All pre-TableView per-list query params (`status=`, `customer_id=`, `source=`, `payment=`,
    `country=`, `created=`, `sort=`, `perPage=`) are no longer accepted and return `422`.
tags: [Admin / Orders]

parameters:
    - $ref: "../../../common/components/parameters/table-view/Page.yaml"
    - $ref: "../../../common/components/parameters/table-view/Limit.yaml"
    - $ref: "../../../common/components/parameters/table-view/Filter.yaml"
    - $ref: "../../../common/components/parameters/table-view/FilterOr.yaml"
    - $ref: "../../../common/components/parameters/table-view/Sort.yaml"
    - name: q
      in: query
      description: Free-text search across `billing_email`, `order_number`, and numeric `id`.
      required: false
      schema: { type: string, maxLength: 120 }
    - name: trashed
      in: query
      description: When `true`, return only soft-deleted orders instead of live ones.
      required: false
      schema: { type: boolean }
    - name: country
      in: query
      description: >
          Multi-select billing-country filter — a comma-separated list of ISO-2 codes
          (`?country=IR,DE`). Matches orders whose billing `order_addresses` row is in any of the
          given countries via a `whereExists` subquery (not a TableView column WHERE).
      required: false
      schema: { type: string }

responses:
    "200":
        description: Paginated order list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, meta]
                    properties:
                        data:
                            type: array
                            items:
                                type: object
                                properties:
                                    id: { type: integer }
                                    order_number: { type: integer }
                                    status: { type: string }
                                    customer_id: { type: [integer, "null"] }
                                    customer_name: { type: string }
                                    billing_email: { type: [string, "null"] }
                                    grand_total: { $ref: "../../../common/components/schemas/Money.yaml" }
                                    items_total: { type: integer }
                                    shipping_total: { type: integer }
                                    tax_total: { type: integer }
                                    discount_total: { type: integer }
                                    currency: { type: string }
                                    currency_display: { type: string }
                                    created_at: { type: string, format: date-time }
                                    updated_at: { type: [string, "null"], format: date-time }
                                    created_via: { type: [string, "null"] }
                                    date_paid_at: { type: [string, "null"], format: date-time }
                                    date_completed_at: { type: [string, "null"], format: date-time }
                                    payment_method_title: { type: [string, "null"] }
                                    item_count: { type: integer }
                                    coupon_codes:
                                        type: array
                                        items: { type: string }
                                    risk_flags:
                                        type: array
                                        items: { type: string }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
    "401":
        $ref: "../../../common/components/responses/Unauthorized.yaml"
    "403":
        $ref: "../../../common/components/responses/Forbidden.yaml"
