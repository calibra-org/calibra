operationId: adminOrdersBatch
summary: Bulk create/update/delete orders
description: Runs every operation in `{ create?, update?, delete? }` inside one DB transaction. Status transitions still go through the state machine and a forbidden transition fails the entire batch.
tags: [Admin / Orders]

requestBody:
    required: true
    content:
        application/json:
            schema: { $ref: "../../components/schemas/BatchOperation.yaml" }

responses:
    "200":
        description: Batch result.
        content:
            application/json:
                schema: { $ref: "../../components/schemas/BatchResult.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
