operationId: adminOrderHistoryIndex
summary: List an order's status-history audit rows
description: >
    Paginated `order_status_history` rows for the order on the unified TableView grammar, by
    default ordered ascending by `occurred_at`. Rows are written by
    {@link OrderStateMachine.transition}; this endpoint is read-only.

    **TableView filterable fields**: `id`, `from_status`, `to_status`, `actor_user_id`,
    `occurred_at`.

    **TableView orderable fields**: `id`, `occurred_at`.
tags: [Admin / Order History]

parameters:
    - { name: order_id, in: path, required: true, schema: { type: integer } }
    - $ref: "../../../common/components/parameters/table-view/Page.yaml"
    - $ref: "../../../common/components/parameters/table-view/Limit.yaml"
    - $ref: "../../../common/components/parameters/table-view/Filter.yaml"
    - $ref: "../../../common/components/parameters/table-view/FilterOr.yaml"
    - $ref: "../../../common/components/parameters/table-view/Sort.yaml"

responses:
    "200":
        description: Paginated status history.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, meta]
                    properties:
                        data:
                            type: array
                            items:
                                type: object
                                properties:
                                    id: { type: integer }
                                    order_id: { type: integer }
                                    from_status: { type: string }
                                    to_status: { type: string }
                                    actor_user_id: { type: [integer, "null"] }
                                    reason: { type: [string, "null"] }
                                    occurred_at: { type: string, format: date-time }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
    "401":
        $ref: "../../../common/components/responses/Unauthorized.yaml"
    "403":
        $ref: "../../../common/components/responses/Forbidden.yaml"
    "404":
        $ref: "../../../common/components/responses/NotFound.yaml"
