operationId: adminOrderDeleteMeta
summary: Delete order meta (admin)
description: Removes the `(order_id, key)` row. Key is URL-encoded path segment.
tags: [Admin / Orders]
parameters:
    - { name: id, in: path, required: true, schema: { type: integer } }
    - { name: key, in: path, required: true, schema: { type: string } }
responses:
    "200":
        description: Updated order envelope.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminOrderDetail.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
