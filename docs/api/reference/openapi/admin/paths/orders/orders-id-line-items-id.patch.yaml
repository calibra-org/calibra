operationId: adminOrderUpdateLineItem
summary: Update an order line item (admin)
description: Update a line's quantity, snapshot price, or name. Recomputes totals after save.
tags: [Admin / Orders]
parameters:
    - { name: id, in: path, required: true, schema: { type: integer } }
    - { name: lineId, in: path, required: true, schema: { type: integer } }
requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                properties:
                    quantity: { type: integer, minimum: 1, maximum: 10000 }
                    price_override_minor: { type: [integer, "null"], minimum: 0 }
                    name: { type: string, maxLength: 255 }
responses:
    "200":
        description: Updated order envelope.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminOrderDetail.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
