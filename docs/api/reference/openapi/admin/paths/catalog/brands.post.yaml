operationId: adminBrandCreate
summary: Create a brand
description: Creates a brand row plus per-locale translation rows.
tags: [Admin / Catalog / Brands]

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [translations]
                properties:
                    image_media_id: { type: [integer, "null"] }
                    translations:
                        type: array
                        minItems: 1
                        items: { $ref: "../../components/schemas/AdminTranslationInput.yaml" }

responses:
    "201":
        description: Brand created.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminTaxonomy.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
