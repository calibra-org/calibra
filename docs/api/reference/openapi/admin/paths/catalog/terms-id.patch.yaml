operationId: adminTermPatch
summary: Partial-update a term
description: Patch the supplied fields; translations are upserted per locale.
tags: [Admin / Catalog / Attribute Terms]

parameters:
    - { name: attribute_id, in: path, required: true, schema: { type: integer } }
    - { name: id, in: path, required: true, schema: { type: integer } }

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                additionalProperties: true

responses:
    "200":
        description: Updated term.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminTaxonomy.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
