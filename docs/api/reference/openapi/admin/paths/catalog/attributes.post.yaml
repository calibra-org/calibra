operationId: adminAttributeCreate
summary: Create an attribute
description: Creates a `product_attributes` row plus per-locale `product_attribute_translations` rows.
tags: [Admin / Catalog / Attributes]

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [slug, type, translations]
                properties:
                    slug: { type: string, minLength: 1, maxLength: 200, examples: ["color", "storage"] }
                    type: { type: string, enum: [select, color, image], default: select }
                    has_archives: { type: boolean, default: false }
                    translations:
                        type: array
                        minItems: 1
                        items: { $ref: "../../components/schemas/AdminTranslationInput.yaml" }

responses:
    "201":
        description: Attribute created.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminAttribute.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
