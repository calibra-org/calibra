operationId: adminVariationsIndex
summary: List a product's variations
description: >
    Flat list of every variation row for the parent product. Not paginated — the variations
    table is small enough (tens to a few hundred rows for SKU-heavy products) that pagination
    would just add noise to the editor's inline data-grid. 404s if the product doesn't exist.
tags: [Admin / Catalog / Variations]

parameters:
    - { name: product_id, in: path, required: true, schema: { type: integer } }

responses:
    "200":
        description: Variation list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/AdminProductVariation.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
