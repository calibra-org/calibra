operationId: adminProductsIndex
summary: List products (admin)
description: >
    Paginated list of products. Sort + pagination + simple per-column filters go through the
    unified TableView wire grammar (`filter[]=field:op:value`, `sort[]=field:dir`, `page`,
    `limit`). The endpoint's bespoke surface — category/tag/brand pivot whereIn subqueries,
    multi-column free-text search, stock_status/stock_level subquery / aggregate filters,
    has_image existence, on_sale schedule-aware window, soft-delete scope toggles, id
    whitelists, and the optional `include=facet_counts` response shape — stays as top-level
    params because they need bespoke whereIn / aggregate / response-shape semantics the v1
    TableView runtime can't model.


    **TableView filterable fields**:
        `id`, `sku`, `gtin`, `type`, `status`, `catalog_visibility`, `featured`, `virtual`,
        `downloadable`, `regular_price`, `sale_price`, `tax_class_id`, `menu_order`,
        `created_at`. Operator validity per type (see the shared `filter[]` parameter docs).


    **TableView orderable fields**: `id`, `sku`, `regular_price`, `menu_order`, `created_at`,
    `updated_at`. (The legacy `sort=name` and `sort=stock_quantity` cases — which required
    orderByRaw across product_translations and inventory_items — are not exposed through
    TableView; sort by `sku` or `created_at` instead, or filter via the dedicated stock
    facets.)


    **Endpoint extensions** (kept as top-level params):
        - `q` — multi-column ILIKE across `product_translations.name` and `products.sku`.
        - `category`, `brand`, `tag` — multi-select: a comma-separated list of ids, `whereIn`
          through the respective pivot tables (`?category=5,8` matches either category).
        - `stock_status` — multi-select: a comma-separated list of statuses, `whereIn` subquery
          on inventory_items (`?stock_status=instock,onbackorder`).
        - `stock_level` — aggregate having-clause grouping (instock / low / outofstock).
        - `on_sale` — schedule-aware sale_starts_at / sale_ends_at window.
        - `has_image` — existence check on product_images.
        - `favorites` — narrows to the requesting admin's starred products (`product_favorites` pivot).
        - `with_trashed` / `only_trashed` — soft-delete scope.
        - `ids` — comma-separated id whitelist.
        - `include=facet_counts` — adds a `facets` block to the envelope; counts are computed
          per facet with each facet temporarily skipped from the predicate set.


    Legacy `?sort=` / `?perPage=` query params are silently dropped — use `sort[]=` and `limit`
    instead.
tags: [Admin / Catalog / Products]

parameters:
    - $ref: "../../../common/components/parameters/table-view/Page.yaml"
    - $ref: "../../../common/components/parameters/table-view/Limit500.yaml"
    - $ref: "../../../common/components/parameters/table-view/Filter.yaml"
    - $ref: "../../../common/components/parameters/table-view/FilterOr.yaml"
    - $ref: "../../../common/components/parameters/table-view/Sort.yaml"
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"
    - { name: q, in: query, schema: { type: string } }
    - { name: status, in: query, schema: { type: string, enum: [draft, publish, pending, private, archived] } }
    - { name: type, in: query, schema: { type: string, enum: [simple, variable, virtual, downloadable, external, grouped] } }
    - { name: category, in: query, description: "Comma-separated category ids (multi-select).", schema: { type: string } }
    - { name: tag, in: query, description: "Comma-separated tag ids (multi-select).", schema: { type: string } }
    - { name: brand, in: query, description: "Comma-separated brand ids (multi-select).", schema: { type: string } }
    - { name: on_sale, in: query, schema: { type: boolean } }
    - { name: stock_status, in: query, description: "Comma-separated stock statuses (multi-select) from instock|outofstock|onbackorder.", schema: { type: string } }
    - { name: stock_level, in: query, schema: { type: string, enum: [instock, low, outofstock] } }
    - { name: catalog_visibility, in: query, schema: { type: string, enum: [visible, catalog, search, hidden] } }
    - { name: featured, in: query, schema: { type: boolean } }
    - { name: has_image, in: query, schema: { type: boolean } }
    - name: favorites
      in: query
      description: When `true`, narrow to products the requesting admin has starred (per-user `product_favorites`).
      schema: { type: boolean }
    - { name: with_trashed, in: query, schema: { type: boolean } }
    - { name: only_trashed, in: query, schema: { type: boolean } }
    - name: ids
      in: query
      schema:
          type: string
          description: 'CSV of product ids to narrow the result set.'
    - name: include
      in: query
      schema:
          type: string
          description: 'Comma list. "facet_counts" adds a `facets` block to the envelope.'

responses:
    "200":
        description: Paginated product list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, meta]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/AdminProduct.yaml" }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
                        facets:
                            type: object
                            description: Facet counts under the active filter set (one bucket per facet, minus self).
                            additionalProperties:
                                type: object
                                additionalProperties: { type: integer }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
