operationId: adminTaxClassesIndex
summary: List tax classes
description: Returns every tax class. Not paginated — the dataset is small (typically <20 rows).
tags: [Admin / Catalog / Tax Classes]

parameters:
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"

responses:
    "200":
        description: Tax-class list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/AdminTaxClass.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
