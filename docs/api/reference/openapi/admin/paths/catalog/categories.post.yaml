operationId: adminCategoryCreate
summary: Create a category
description: Creates a category row plus per-locale translation rows. Pass `parent_id` to nest the category under another.
tags: [Admin / Catalog / Categories]

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [translations]
                properties:
                    parent_id: { type: [integer, "null"] }
                    image_media_id: { type: [integer, "null"] }
                    menu_order: { type: integer, default: 0 }
                    translations:
                        type: array
                        minItems: 1
                        items: { $ref: "../../components/schemas/AdminTranslationInput.yaml" }

responses:
    "201":
        description: Category created.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminTaxonomy.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
