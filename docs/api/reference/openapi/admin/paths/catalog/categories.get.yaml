operationId: adminCategoriesIndex
summary: List categories (admin)
description: Paginated list of every non-deleted category. Use `parent_id` to fetch one level of the hierarchy.
tags: [Admin / Catalog / Categories]

parameters:
    - $ref: "../../../common/components/parameters/PageQuery.yaml"
    - $ref: "../../../common/components/parameters/table-view/Limit.yaml"
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"
    - { name: parent_id, in: query, schema: { type: integer }, description: "Filter children of a parent. Pass `0` for top-level rows." }
    - { name: search, in: query, schema: { type: string } }
    - name: sort
      in: query
      description: >
          Optional ordering. `-used_count` ranks the rows most-used-first (categories with the
          most attached products), `used_count` ranks ascending. Default (omitted) is
          `menu_order` then `id`. Cached for 2 minutes; invalidated on any taxonomy write.
      schema:
          type: string
          enum: [used_count, -used_count, menu_order, -menu_order]

responses:
    "200":
        description: Paginated category list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/AdminTaxonomy.yaml" }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
