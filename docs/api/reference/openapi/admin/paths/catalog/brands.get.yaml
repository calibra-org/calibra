operationId: adminBrandsIndex
summary: List brands (admin)
description: Paginated list of every non-deleted brand.
tags: [Admin / Catalog / Brands]

parameters:
    - $ref: "../../../common/components/parameters/PageQuery.yaml"
    - $ref: "../../../common/components/parameters/PerPageQuery.yaml"
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"
    - { name: search, in: query, schema: { type: string } }
    - name: sort
      in: query
      description: >
          Optional ordering. `-used_count` ranks brands most-used-first; `used_count` ranks
          ascending. Default (omitted) is `menu_order` then `id`. Cached for 2 minutes;
          invalidated on any taxonomy write.
      schema:
          type: string
          enum: [used_count, -used_count, menu_order, -menu_order]

responses:
    "200":
        description: Paginated brand list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/AdminTaxonomy.yaml" }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
