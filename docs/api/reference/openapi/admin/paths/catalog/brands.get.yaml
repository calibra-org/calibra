operationId: adminBrandsIndex
summary: List brands (admin)
description: >
    Paginated list of every non-deleted brand on the unified TableView grammar.

    **TableView filterable fields**: `id`, `slug`, `menu_order`, `created_at`.

    **TableView orderable fields**: `id`, `slug`, `menu_order`, `created_at`, `used_count`.

    `used_count` sorts by the live `product_brand_links` count via a correlated subquery; use
    `?sort[]=used_count:desc` to rank brands most-used first. Default page size is 100 (large
    enough to render the typical full set into selector / combobox UIs without a `?limit=`
    override). Legacy `?perPage=` / `?sort=-used_count` / `?search=` no longer parse.
tags: [Admin / Catalog / Brands]

parameters:
    - $ref: "../../../common/components/parameters/table-view/Page.yaml"
    - $ref: "../../../common/components/parameters/table-view/Limit.yaml"
    - $ref: "../../../common/components/parameters/table-view/Filter.yaml"
    - $ref: "../../../common/components/parameters/table-view/FilterOr.yaml"
    - $ref: "../../../common/components/parameters/table-view/Sort.yaml"
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"
    - { name: q, in: query, schema: { type: string, maxLength: 120 }, description: "Multi-column ILIKE across slug + translated name." }

responses:
    "200":
        description: Paginated brand list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, meta]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/AdminTaxonomy.yaml" }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
