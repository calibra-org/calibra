operationId: adminProductReplace
summary: Replace a product
description: >
    Full replace — every field on the resource takes the request body's value. Missing
    fields are reset to their defaults. For partial updates, use `PATCH` instead.
    `translations[]` replaces the locale rows; omitting a previously-present locale deletes
    that translation row.
tags: [Admin / Catalog / Products]

parameters:
    - { name: id, in: path, required: true, schema: { type: integer } }
    - name: If-Match
      in: header
      required: false
      description: >
          Optional optimistic-concurrency token — pass the `updated_at` ISO string from the row the
          operator originally fetched. Returns 409 if the row has changed since.
      schema: { type: string, format: date-time }

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                additionalProperties: true
                description: Same shape as `POST /admin/products` (the `type` may not change once set).

responses:
    "200":
        description: Updated product detail.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminProductDetail.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
    "409":
        description: Optimistic-concurrency mismatch.
        content:
            application/json:
                schema:
                    type: object
                    properties:
                        errors:
                            type: array
                            items:
                                type: object
                                properties:
                                    message: { type: string }
                                    code: { type: string }
                        data:
                            type: object
                            properties:
                                id: { type: integer }
                                updated_at: { type: string, format: date-time }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
