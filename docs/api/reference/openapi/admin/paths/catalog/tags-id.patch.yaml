operationId: adminTagPatch
summary: Partial-update a tag
description: Patch the included fields; translations are upserted per locale.
tags: [Admin / Catalog / Tags]

parameters:
    - { name: id, in: path, required: true, schema: { type: integer } }

requestBody:
    required: true
    content:
        application/json:
            schema: { type: object, additionalProperties: true }

responses:
    "200":
        description: Updated tag.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminTaxonomy.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
