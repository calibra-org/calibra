operationId: adminVariationCreate
summary: Create a variation
description: >
    Creates a variation under a `type=variable` product. `attribute_terms[]` must reference
    every attribute marked `variation: true` on the parent product, and the combination must be
    unique across this product's variations (422 with `E_DUPLICATE_VARIATION` otherwise).
tags: [Admin / Catalog / Variations]

parameters:
    - { name: product_id, in: path, required: true, schema: { type: integer } }

requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [attribute_terms]
                properties:
                    sku: { type: [string, "null"] }
                    status:
                        type: string
                        enum: [draft, active, inactive, archived]
                        default: active
                    regular_price: { anyOf: [{ $ref: "../../../common/components/schemas/Money.yaml" }, { type: "null" }] }
                    sale_price: { anyOf: [{ $ref: "../../../common/components/schemas/Money.yaml" }, { type: "null" }] }
                    sale_starts_at: { type: [string, "null"], format: date-time }
                    sale_ends_at: { type: [string, "null"], format: date-time }
                    tax_class_id: { type: [integer, "null"] }
                    weight_grams: { type: [integer, "null"] }
                    length_mm: { type: [integer, "null"] }
                    width_mm: { type: [integer, "null"] }
                    height_mm: { type: [integer, "null"] }
                    image_media_id: { type: [integer, "null"] }
                    attribute_terms:
                        type: array
                        minItems: 1
                        items:
                            type: object
                            required: [attribute_id, term_id]
                            properties:
                                attribute_id: { type: integer }
                                term_id: { type: integer }

responses:
    "201":
        description: Variation created.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminProductVariation.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
