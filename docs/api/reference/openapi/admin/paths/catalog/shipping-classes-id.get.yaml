operationId: adminShippingClassShow
summary: Fetch a shipping class
description: Returns the shipping-class row with every translation.
tags: [Admin / Catalog / Shipping Classes]

parameters:
    - { name: id, in: path, required: true, schema: { type: integer } }
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"

responses:
    "200":
        description: Shipping class detail.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminShippingClass.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
