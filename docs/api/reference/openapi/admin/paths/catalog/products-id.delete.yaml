operationId: adminProductDelete
summary: Soft-delete a product
description: >
    Sets `products.deleted_at = now()`. The product disappears from every storefront query but
    remains referenced by historical orders. Restoring is a `PATCH` with `deleted_at: null`.
tags: [Admin / Catalog / Products]

parameters:
    - { name: id, in: path, required: true, schema: { type: integer } }

responses:
    "204":
        description: Deleted.
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
    "409": { $ref: "../../../common/components/responses/Conflict.yaml" }
