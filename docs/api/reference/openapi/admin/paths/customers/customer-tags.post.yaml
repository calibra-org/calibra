operationId: adminCustomerTagsStore
summary: Create a customer tag (admin)
description: Returns the existing row if a tag with the same normalised name already exists.
tags: [Admin / Customers]
parameters:
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"
requestBody:
    required: true
    content:
        application/json:
            schema:
                type: object
                required: [name]
                properties:
                    name: { type: string, minLength: 1, maxLength: 40 }
responses:
    "200":
        description: Tag already existed.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminCustomerTag.yaml" }
    "201":
        description: Tag created.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminCustomerTag.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
