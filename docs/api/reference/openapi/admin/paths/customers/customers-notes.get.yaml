operationId: adminCustomerNotesIndex
summary: List notes on a customer (admin)
description: Internal notes, newest first. The `author` is the admin who wrote each note.
tags: [Admin / Customers]
parameters:
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"
    - { name: customer_id, in: path, required: true, schema: { type: integer } }
responses:
    "200":
        description: Notes list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/AdminCustomerNote.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
