operationId: adminCustomerSegmentsIndex
summary: List customer segments (admin, owner-scoped)
description: >
    Paginated list of segments owned by the calling admin, on the unified TableView grammar.
    Owner-scope pre-applied at the controller (security invariant) — a forged
    `?filter[]=user_id:eq:N` cannot read another operator's saved segments. Pinned segments
    come first by default.

    **TableView filterable fields**: `id`, `name`, `is_pinned`, `created_at`, `last_used_at`.

    **TableView orderable fields**: `id`, `name`, `is_pinned`, `created_at`, `last_used_at`.
tags: [Admin / Customers]
parameters:
    - $ref: "../../../common/components/parameters/table-view/Page.yaml"
    - $ref: "../../../common/components/parameters/table-view/Limit.yaml"
    - $ref: "../../../common/components/parameters/table-view/Filter.yaml"
    - $ref: "../../../common/components/parameters/table-view/FilterOr.yaml"
    - $ref: "../../../common/components/parameters/table-view/Sort.yaml"
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"
responses:
    "200":
        description: Paginated segments list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, meta]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/AdminCustomerSegment.yaml" }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
