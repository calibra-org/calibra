operationId: adminCustomerSendPasswordReset
summary: Trigger a password-reset email for a customer (admin)
description: 400 for guest customers. Echoes the plaintext token in dev so the smoke flow works without a mail provider.
tags: [Admin / Customers]
parameters:
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"
    - { name: id, in: path, required: true, schema: { type: integer } }
responses:
    "200":
        description: Reset token issued.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            type: object
                            required: [ok]
                            properties:
                                ok: { type: boolean }
                                reset_token: { type: [string, "null"] }
    "400":
        description: Customer is a guest — convert to account first.
        content:
            application/json:
                schema: { $ref: "../../../common/components/schemas/BasicMessage.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "404": { $ref: "../../../common/components/responses/NotFound.yaml" }
