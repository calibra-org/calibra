operationId: adminSupportIndex
summary: List support conversations (admin)
description: >
    Returns the support conversations visible to the calling agent (scoped by their access
    tier). Each row is a `TicketConversation` envelope without the message thread.
tags: [Admin / Support]

responses:
    "200":
        description: Support-conversation list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/TicketConversation.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
