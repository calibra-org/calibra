operationId: adminMediaUpload
summary: Upload a media file
description: >
    Single-file multipart upload. The form field name is `file`. The server persists the file on
    local disk under `storage/uploads/{yyyy}/{mm}/` and returns the row with the publicly fetchable
    URL. Files larger than the configured limit (20 MB by default) return 422.
tags: [Admin / Media]

requestBody:
    required: true
    content:
        multipart/form-data:
            schema:
                type: object
                required: [file]
                properties:
                    file:
                        type: string
                        format: binary
                        description: The uploaded file.

responses:
    "201":
        description: Media row created.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data: { $ref: "../../components/schemas/AdminMedia.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
    "422": { $ref: "../../../common/components/responses/ValidationError.yaml" }
