operationId: adminMediaIndex
summary: List media library entries (admin)
description: >
    Paginated media library listing. Sort + pagination + per-column filters go through the
    unified TableView grammar; the WordPress-style filter pills (`type` MIME-group expansion,
    `month` YYYY-MM bucket, multi-column `q`, `unattached` / `mine` existence checks,
    `uploaded_by`) stay as top-level params because their semantics need bespoke whereIn /
    subquery / OR logic the v1 runtime can't model.


    **TableView filterable fields**: `id`, `kind`, `mime`, `size_bytes`, `width`, `height`,
    `uploaded_by_user_id`, `created_at`, `filename`.


    **TableView orderable fields**: `id`, `size_bytes`, `created_at`, `filename`.


    Default `limit` is 60 (the media grid's natural row count); legacy `?perPage=` / `?per_page=`
    keep working as aliases for `limit` so the existing FE doesn't need a wire refactor in this
    PR.
tags: [Admin / Media]

parameters:
    - $ref: "../../../common/components/parameters/table-view/Page.yaml"
    - $ref: "../../../common/components/parameters/table-view/Limit.yaml"
    - $ref: "../../../common/components/parameters/table-view/Filter.yaml"
    - $ref: "../../../common/components/parameters/table-view/FilterOr.yaml"
    - $ref: "../../../common/components/parameters/table-view/Sort.yaml"
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"
    - name: type
      in: query
      schema:
          type: string
          enum: [all, image, audio, video, document, spreadsheet, archive, unattached, mine]
      description: >
          MIME group (`image` / `audio` / `video` / `document` / `spreadsheet` / `archive`),
          `unattached` for rows not linked to any product image, or `mine` for rows uploaded by
          the calling user.
    - name: month
      in: query
      schema: { type: string, pattern: "^\\d{4}-\\d{2}$" }
      description: Filter to a single calendar month, formatted `YYYY-MM` (UTC).
    - name: q
      in: query
      schema: { type: string }
      description: Case-insensitive substring match against filename, title, alt, and URL.
    - name: uploaded_by
      in: query
      schema: { type: integer, minimum: 1 }
      description: Restrict to rows uploaded by the given user id.

responses:
    "200":
        description: Paginated media list.
        content:
            application/json:
                schema:
                    type: object
                    required: [data, meta]
                    properties:
                        data:
                            type: array
                            items: { $ref: "../../components/schemas/AdminMedia.yaml" }
                        meta: { $ref: "../../../common/components/schemas/PaginationMeta.yaml" }
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
