operationId: adminSettingsDatetimeShow
summary: Get Date & Time settings (admin)
description: >
    Returns the active date/time format patterns plus the fixed preset lists that back the Date &
    Time tab's radio groups.
tags: [Admin / Settings]

parameters:
    - $ref: "../../../common/components/parameters/LocaleHeader.yaml"

responses:
    "200":
        description: Date & Time settings + preset lists.
        content:
            application/json:
                schema:
                    type: object
                    required: [data]
                    properties:
                        data:
                            $ref: "../../components/schemas/AdminDateTimeSettings.yaml"
    "401": { $ref: "../../../common/components/responses/Unauthorized.yaml" }
    "403": { $ref: "../../../common/components/responses/Forbidden.yaml" }
