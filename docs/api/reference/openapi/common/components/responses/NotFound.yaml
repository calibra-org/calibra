description: >
    Not found (404) — the path is well-formed but the referenced resource does not exist (or has
    been soft-deleted).
content:
    application/json:
        schema:
            type: object
            properties:
                errors:
                    type: array
                    items:
                        $ref: "../schemas/BasicMessage.yaml"
            required: [errors]
        examples:
            notFound:
                summary: Resource not found
                value:
                    errors:
                        - message: "Order not found"
                          code: "E_NOT_FOUND"
