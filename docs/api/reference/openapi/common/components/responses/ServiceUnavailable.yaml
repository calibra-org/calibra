description: >
    Service unavailable (503) — a downstream dependency (payment gateway, search index, mail
    delivery) is temporarily unreachable. Safe to retry with exponential backoff.
content:
    application/json:
        schema:
            type: object
            properties:
                errors:
                    type: array
                    items:
                        $ref: "../schemas/BasicMessage.yaml"
            required: [errors]
        examples:
            serviceUnavailable:
                summary: Downstream outage
                value:
                    errors:
                        - message: "Service temporarily unavailable"
                          code: "E_SERVICE_UNAVAILABLE"
