title: Operator
description: A shop operator (admin user). Emitted identically by the control-plane console and the
    admin Team page. `is_store_owner` marks the protected owner; `status` derives from the credential
    lifecycle; `capabilities` are computed per caller.
type: object
properties:
    id: { type: integer }
    name: { type: string }
    email: { type: [string, "null"], format: email }
    role: { type: string, examples: ["admin"] }
    is_store_owner: { type: boolean }
    status: { type: string, enum: [active, disabled, never_signed_in] }
    last_login_at: { type: [string, "null"], format: date-time }
    created_at: { type: [string, "null"], format: date-time }
    capabilities: { $ref: "./OperatorCapabilities.yaml" }
required: [id, name, email, role, is_store_owner, status, last_login_at, created_at, capabilities]
