title: OperatorCredentialReveal
description: Reveal-once operator credentials. Either a `temp_password` (with `must_change_password`)
    OR a single-use `handoff_url` — mutually exclusive (one live secret per action). Never re-served.
type: object
properties:
    temp_password: { type: [string, "null"] }
    handoff_url: { type: [string, "null"], format: uri }
    must_change_password: { type: boolean }
required: [temp_password, handoff_url]
