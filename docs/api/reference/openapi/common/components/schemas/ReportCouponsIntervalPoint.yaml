title: ReportCouponsIntervalPoint
description: One time-bucket of the coupon-usage series. `date` is the bucket's start (UTC calendar date).
type: object
required: [date, discounted_orders, amount]
properties:
    date: { type: string, format: date }
    discounted_orders: { type: integer, minimum: 0 }
    amount: { $ref: "./Money.yaml" }
