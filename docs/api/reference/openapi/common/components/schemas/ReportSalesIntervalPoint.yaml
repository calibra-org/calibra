title: ReportSalesIntervalPoint
description: One time-bucket of the sales series. `date` is the bucket's start (UTC calendar date).
type: object
required: [date, orders, gross_sales, net_sales, total_sales, taxes, shipping, coupons, returns, items_sold]
properties:
    date: { type: string, format: date }
    orders: { type: integer, minimum: 0 }
    gross_sales: { $ref: "./Money.yaml" }
    net_sales: { $ref: "./Money.yaml" }
    total_sales: { $ref: "./Money.yaml" }
    taxes: { $ref: "./Money.yaml" }
    shipping: { $ref: "./Money.yaml" }
    coupons: { $ref: "./Money.yaml" }
    returns: { $ref: "./Money.yaml" }
    items_sold: { type: integer, minimum: 0 }
